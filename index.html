<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* Core palette - light mode with navy accents */
  --bg:#EEF4FB;
  --bg2:#E4EDF8;
  --surface:#FFFFFF;
  --surface2:#F5F9FF;
  --navy:#0B1929;
  --navy2:#122540;
  --navy3:#1A3357;
  --navy4:#1f3d6b;
  --blue:#2563EB;
  --blue2:#3B82F6;
  --blue3:#60A5FA;
  --bluelt:#DBEAFE;
  --bluelt2:#EFF6FF;
  --border:#C7DCEF;
  --border2:#A8C5E0;
  --text:#0B1929;
  --text2:#2A3F5A;
  --text3:#5A7490;
  --text4:#8BA8C0;
  --danger:#DC2626;--dangerbg:#FEE2E2;
  --green:#059669;--greenbg:#D1FAE5;
  --amber:#D97706;--amberbg:#FEF3C7;
  --purple:#7C3AED;--purplebg:#EDE9FE;
  --orange:#EA580C;--orangebg:#FFEDD5;
  --sidebar:240px;--r:12px;--rsm:8px;--rlg:16px;
}
html,body{height:100%;background:linear-gradient(90deg,var(--navy) 0%,#0f2b57 12%,rgba(59,130,246,0.06) 45%,rgba(234,246,255,1) 100%);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.55;overflow-x:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--navy);border-right:none;position:fixed;left:0;top:0;height:100vh;display:flex;flex-direction:column;z-index:50;box-shadow:4px 0 20px rgba(11,25,41,0.15)}
.brand{padding:22px 18px 20px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:0}
.brand-text{display:flex;flex-direction:column}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#ffffff;letter-spacing:.03em;line-height:1.1;font-style:italic}
.brand-sub{font-size:9.5px;font-weight:500;color:rgba(255,255,255,0.4);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
.nav{padding:14px 0;flex:1;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:.15em;text-transform:uppercase;padding:16px 18px 5px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;transition:all .15s;border-left:2.5px solid transparent;margin:1px 0}
.ni:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.06)}
.ni.active{color:#ffffff;background:rgba(37,99,235,0.25);border-left-color:var(--blue2)}
.ni i{font-size:16px;width:18px;flex-shrink:0}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;background:rgba(37,99,235,0.35);color:#93C5FD;border-radius:20px;padding:1px 8px}
.sidebar-footer{padding:14px 18px;border-top:1px solid rgba(255,255,255,0.07)}
.sidebar-footer p{font-size:10px;color:rgba(255,255,255,0.25);line-height:1.8}
.sidebar-footer .build-credit{margin-top:8px;font-size:11px;color:rgba(255,255,255,0.7);font-weight:600;letter-spacing:0.02em;text-transform:uppercase}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-shrink:0;box-shadow:0 1px 4px rgba(11,25,41,0.06)}
.page-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--navy);letter-spacing:.01em}
.topbar-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.content{padding:28px;flex:1}

/* ── BUTTONS ── */
.btn{font-size:13px;font-weight:600;padding:9px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.6);background:#ffffff;color:var(--navy);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .18s ease;font-family:'DM Sans',sans-serif;white-space:nowrap;box-shadow:0 8px 18px rgba(2,6,23,0.06)}
.btn:hover{transform:translateY(-2px);box-shadow:0 14px 28px rgba(2,6,23,0.08)}
.btn.primary{background:linear-gradient(90deg,var(--blue2),var(--blue3));color:#fff;border:none;box-shadow:0 12px 30px rgba(37,99,235,0.18);padding:10px 18px}
.btn.primary:hover{transform:translateY(-3px);box-shadow:0 18px 38px rgba(37,99,235,0.22)}
.btn.sm{font-size:11.5px;padding:5px 12px}
.btn.ghost{background:transparent;border:none;box-shadow:none;color:var(--text3)}
.btn.ghost:hover{color:var(--navy);background:var(--bluelt2)}
.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.blue:hover{background:var(--blue2)}

.settings-grid{display:grid;grid-template-columns:repeat(3,minmax(260px,1fr));gap:18px;margin-bottom:24px}
@media(max-width:1100px){.settings-grid{grid-template-columns:1fr}}
.muted{color:var(--text3);font-size:13px;line-height:1.7}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.stats-grid.c3{grid-template-columns:repeat(3,1fr)}
.sc{background:linear-gradient(180deg,#2f4d7b,#1f355e);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:all .24s ease;box-shadow:0 14px 32px rgba(2,6,23,0.12),0 2px 6px rgba(255,255,255,0.03);color:#fff}
.stats-grid .sc:nth-child(1){background:linear-gradient(180deg,#3f5b8f,#2d4670)}
.stats-grid .sc:nth-child(2){background:linear-gradient(180deg,#365380,#253f63)}
.stats-grid .sc:nth-child(3){background:linear-gradient(180deg,#2b4772,#1f3459)}
.stats-grid .sc:nth-child(4){background:linear-gradient(180deg,#243f68,#172a48)}
.sc:hover{transform:translateY(-6px);box-shadow:0 28px 60px rgba(2,6,23,0.16),0 2px 8px rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.18)}

/* Directional adaptive glow */
.glow-left{box-shadow: -18px 28px 56px rgba(33,66,118,0.18),0 18px 40px rgba(15,23,42,0.06),0 1px 0 rgba(255,255,255,0.6) !important}
.glow-right{box-shadow: 18px 28px 56px rgba(16,35,78,0.18),0 18px 40px rgba(15,23,42,0.06),0 1px 0 rgba(255,255,255,0.6) !important}

@keyframes glowPulseLeft{
  0%{box-shadow: -12px 20px 40px rgba(33,66,118,0.08),0 14px 34px rgba(15,23,42,0.06),0 1px 0 rgba(255,255,255,0.6)}
  50%{box-shadow: -30px 44px 86px rgba(33,66,118,0.22),0 22px 48px rgba(15,23,42,0.08),0 1px 0 rgba(255,255,255,0.7)}
  100%{box-shadow: -12px 20px 40px rgba(33,66,118,0.08),0 14px 34px rgba(15,23,42,0.06),0 1px 0 rgba(255,255,255,0.6)}
}
@keyframes glowPulseRight{
  0%{box-shadow: 12px 20px 40px rgba(16,35,78,0.08),0 14px 34px rgba(15,23,42,0.06),0 1px 0 rgba(255,255,255,0.6)}
  50%{box-shadow: 30px 44px 86px rgba(16,35,78,0.22),0 22px 48px rgba(15,23,42,0.08),0 1px 0 rgba(255,255,255,0.7)}
  100%{box-shadow: 12px 20px 40px rgba(16,35,78,0.08),0 14px 34px rgba(15,23,42,0.06),0 1px 0 rgba(255,255,255,0.6)}
}

.glow-left.glow-animate, .glow-left:hover{animation:glowPulseLeft 900ms ease-out}
.glow-right.glow-animate, .glow-right:hover{animation:glowPulseRight 900ms ease-out}

.sc-strip{position:absolute;top:0;left:0;right:0;height:4px;border-radius:12px 12px 0 0;background:linear-gradient(270deg,#f7f8fa,#e4e9ef);box-shadow:inset 0 1px 2px rgba(0,0,0,0.08);}
.sc-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:18px;margin-top:6px;background:#fff;border:1px solid rgba(255,255,255,0.18);position:relative;box-shadow:0 10px 24px rgba(2,6,23,0.14),inset 0 1px 0 rgba(255,255,255,0.6);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.sc-icon::before{content:'';position:absolute;inset:-8px;border-radius:999px;background:radial-gradient(circle at 30% 25%,rgba(37,99,235,0.28),rgba(96,165,250,0.14) 40%,transparent 60%);filter:blur(8px);z-index:-1;}
.sc-icon::after{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,0.75),rgba(255,255,255,0.18));mix-blend-mode:overlay;pointer-events:none}
.sc-icon i{position:relative;z-index:2;color:var(--navy);font-size:18px}
.sc-icon.blue{background:#fff;color:var(--blue)}
.sc-icon.green{background:#fff;color:var(--green)}
.sc-icon.red{background:#fff;color:var(--danger)}
.sc-icon.amber{background:#fff;color:var(--amber)}

.sc .sc-n,.sc .sc-l{color:#fff}
.sc-n{font-size:32px;font-weight:300;color:var(--navy);line-height:1;margin-bottom:4px;letter-spacing:-.02em}
.sc-l{font-size:11.5px;font-weight:600;color:var(--text3);letter-spacing:.02em}

/* ── PROGRESS ── */
.tprog{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:26px;display:flex;align-items:center;gap:24px;box-shadow:0 2px 8px rgba(11,25,41,0.06)}
.tprog-body{flex:1}
.tprog-head{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;color:var(--text3);margin-bottom:10px}
.tprog-head span:first-child{color:var(--navy);font-weight:600}
.tprog-track{height:7px;background:linear-gradient(270deg,#f7f8fa,#e4e9ef);border-radius:7px;overflow:hidden;box-shadow:inset 0 2px 5px rgba(0,0,0,0.06)}
.tprog-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,var(--blue),var(--blue3));transition:width .6s cubic-bezier(.4,0,.2,1)}
.tprog-terms{display:flex;gap:6px;flex-shrink:0}
.tterm{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;background:var(--bg2);color:var(--text3);border:1px solid var(--border)}
.tterm.cur{background:var(--navy);color:#fff;border-color:var(--navy)}

.dashboard-hero{position:relative;display:grid;grid-template-columns:1.7fr 1fr;gap:22px;background:linear-gradient(135deg,rgba(235,244,255,0.98),rgba(219,232,255,0.95) 40%,rgba(255,255,255,0.95));border:1px solid rgba(96,165,250,0.22);border-radius:26px;padding:30px;overflow:hidden;box-shadow:0 30px 70px rgba(37,99,235,0.12);margin-bottom:30px}
.dashboard-hero::before,.dashboard-hero::after{content:'';position:absolute;border-radius:50%;opacity:.45}
.dashboard-hero::before{width:220px;height:220px;top:-50px;right:-50px;background:radial-gradient(circle,rgba(59,130,246,0.22),transparent 55%)}
.dashboard-hero::after{width:140px;height:140px;bottom:-40px;left:-30px;background:radial-gradient(circle,rgba(96,165,250,0.18),transparent 55%)}
.hero-copy{position:relative;z-index:2;display:flex;flex-direction:column;gap:16px}
.hero-copy .hero-label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);opacity:.9}
.hero-copy h2{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:700;color:var(--navy);letter-spacing:.03em;line-height:1.05;max-width:520px;font-style:italic}
.hero-copy p{max-width:560px;color:var(--text2);font-size:15px;line-height:1.75}
.hero-stats{display:flex;gap:12px;flex-wrap:wrap}
.hero-metric{background:rgba(255,255,255,0.92);border:1px solid rgba(226,232,240,0.95);border-radius:18px;padding:18px 20px;min-width:150px;box-shadow:0 18px 40px rgba(15,23,42,0.08),0 1px 0 rgba(255,255,255,0.65);cursor:pointer;transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.hero-metric:hover{transform:translateY(-4px);box-shadow:0 24px 46px rgba(15,23,42,0.12),0 1px 0 rgba(255,255,255,0.75);border-color:rgba(203,213,225,0.95)}
.hero-metric strong{display:block;font-size:26px;color:var(--navy);font-weight:700;margin-bottom:4px}
.hero-metric span{font-size:12px;color:var(--text4);text-transform:uppercase;letter-spacing:.08em}
.hero-image-panel{position:relative;z-index:2;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:18px}
.hero-avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(145deg,#2a406b,#192a4a);display:flex;align-items:center;justify-content:center;box-shadow:0 24px 40px rgba(2,6,23,0.18);position:relative;overflow:hidden;border:1px solid rgba(255,255,255,0.2)}
.hero-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hero-avatar span{font-size:42px;font-weight:700;color:#fff;letter-spacing:.08em}
.hero-avatar::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 25%,rgba(255,255,255,0.25),transparent 35%)}
.hero-avatar-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;background:rgba(255,255,255,0.85);color:var(--blue);padding:7px 12px;border-radius:999px;box-shadow:0 10px 30px rgba(37,99,235,0.08)}
.hero-icon-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end}
.hero-icon{width:56px;height:56px;border-radius:999px;background:#fff;border:1px solid rgba(190,195,200,0.95);display:flex;align-items:center;justify-content:center;box-shadow:0 14px 36px rgba(2,6,23,0.08),inset 0 1px 0 rgba(255,255,255,0.7);color:var(--blue);font-size:22px;cursor:pointer;transition:all .28s cubic-bezier(.2,.9,.3,1);position:relative;overflow:hidden}
.hero-icon::before{content:'';position:absolute;inset:-8px;border-radius:999px;background:radial-gradient(circle at 25% 25%,rgba(37,99,235,0.34),rgba(96,165,250,0.14) 45%,transparent 65%);filter:blur(10px);z-index:-2}
.hero-icon::after{content:'';position:absolute;inset:0;border-radius:999px;background:linear-gradient(180deg,rgba(255,255,255,0.72),rgba(255,255,255,0.14));mix-blend-mode:overlay;pointer-events:none}
.hero-icon i{position:relative;z-index:2;color:var(--navy);font-size:20px}
.hero-icon:hover{transform:translateY(-4px) scale(1.05);box-shadow:0 22px 48px rgba(2,6,23,0.12),inset 0 1px 0 rgba(255,255,255,0.8)}
.hero-icon:active{transform:translateY(-2px) scale(1.02)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.fb{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;box-shadow:0 1px 3px rgba(11,25,41,0.05)}
.fb:hover{border-color:var(--border2);color:var(--navy);background:var(--bluelt2)}
.fb.on{background:var(--navy);color:#fff;border-color:var(--navy);box-shadow:0 2px 6px rgba(11,25,41,0.2)}
.fdiv{width:1px;height:22px;background:var(--border);margin:0 6px;align-self:center}

/* ── SECTION HEADER ── */
.shdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.shdr-title{font-family:'DM Serif Display',serif;font-size:15px;color:var(--navy);letter-spacing:.01em}
.spill{font-size:10.5px;font-weight:600;background:var(--bluelt);color:var(--blue);border-radius:20px;padding:2px 10px}
.sline{flex:1;height:1px;background:var(--border)}

/* ── TASK CARD ── */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;overflow:hidden;transition:all .15s;box-shadow:0 1px 4px rgba(11,25,41,0.05)}
.tc:hover{border-color:var(--border2);box-shadow:0 4px 12px rgba(11,25,41,0.1)}
.tc-main{display:flex;align-items:flex-start;gap:11px;padding:12px 14px;cursor:pointer;user-select:none}
.chk{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;transition:all .15s;background:var(--surface2)}
.chk:hover{border-color:var(--blue);background:var(--bluelt)}
.chk.on{background:var(--navy);border-color:var(--navy)}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:13.5px;font-weight:500;color:var(--navy);margin-bottom:5px;line-height:1.4}
.tc-title.done{text-decoration:line-through;color:var(--text4)}
.tc-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:20px;letter-spacing:.01em}
.tag-admin{background:var(--bluelt);color:var(--blue)}
.tag-nesa{background:var(--dangerbg);color:var(--danger)}
.tag-staff{background:var(--greenbg);color:var(--green)}
.tag-reporting{background:var(--purplebg);color:var(--purple)}
.tag-event{background:var(--amberbg);color:var(--amber)}
.tag-meeting{background:var(--orangebg);color:var(--orange)}
.tag-neutral{background:var(--bg2);color:var(--text3)}
.dlabel{font-size:11px;font-weight:500;color:var(--text4);display:flex;align-items:center;gap:3px}
.dlabel.od{color:var(--danger);background:var(--dangerbg);padding:1px 6px;border-radius:4px}
.tc-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.xbtn{background:none;border:none;color:var(--text4);cursor:pointer;font-size:14px;padding:3px;transition:all .15s;line-height:1}
.xbtn:hover{color:var(--navy)}
.xbtn.open{transform:rotate(180deg)}
.ibtn{background:none;border:none;cursor:pointer;color:var(--text4);padding:4px 5px;border-radius:6px;font-size:14px;opacity:0;transition:all .15s}
.tc:hover .ibtn{opacity:1}
.ibtn:hover{color:var(--navy);background:var(--bg2)}
.ibtn.del:hover{color:var(--danger);background:var(--dangerbg)}

/* ── SUBTASKS ── */
.subs{padding:4px 14px 11px 43px;border-top:1px solid var(--bg2);background:var(--surface2)}
.subrow{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--bg2)}
.subrow:last-child{border-bottom:none}
.schk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s;background:var(--surface2)}
.schk.on{background:var(--navy);border-color:var(--navy)}
.subtit{font-size:12.5px;font-weight:500;color:var(--text2);flex:1}
.subtit.done{text-decoration:line-through;color:var(--text4)}
.subacts{display:flex;gap:2px;opacity:0}
.subrow:hover .subacts{opacity:1}
.sib{background:none;border:none;cursor:pointer;color:var(--text4);font-size:12px;padding:2px 4px;border-radius:4px;transition:all .15s}
.sib:hover{color:var(--navy)}
.sib.del:hover{color:var(--danger)}
.addinline{display:flex;align-items:center;gap:7px;margin-top:8px}
.addinline input{flex:1;font-size:12.5px;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--rsm);padding:6px 10px;font-family:'DM Sans',sans-serif;transition:all .15s}
.addinline input::placeholder{color:var(--text4)}
.addinline input:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px var(--bluelt)}
.addinline button{font-size:12px;font-weight:600;padding:6px 13px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.addinline button:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── PROJECTS ── */
.projcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;transition:all .15s;box-shadow:0 1px 4px rgba(11,25,41,0.05)}
.projcard:hover{border-color:var(--border2);box-shadow:0 4px 14px rgba(11,25,41,0.1)}
.projhdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.projicon{width:38px;height:38px;border-radius:10px;background:var(--bluelt);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;color:var(--blue)}
.projinfo{flex:1;min-width:0}
.projname{font-family:'DM Serif Display',serif;font-size:15px;color:var(--navy)}
.projsub{font-size:11.5px;font-weight:500;color:var(--text3);margin-top:2px}
.projright{display:flex;align-items:center;gap:9px}
.progwrap{display:flex;align-items:center;gap:8px}
.progbar{width:75px;height:6px;background:var(--bg2);border-radius:6px;overflow:hidden}
.progfill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--blue3))}
.progpct{font-size:11.5px;font-weight:600;color:var(--text3);min-width:32px;text-align:right}
.projbody{padding:4px 16px 13px 66px;border-top:1px solid var(--bg2);background:var(--surface2)}
.steprow{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid var(--bg2)}
.steprow:last-child{border-bottom:none}
.stchk{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;transition:all .15s;background:var(--surface)}
.stchk.on{background:var(--navy);border-color:var(--navy)}
.stbody{flex:1;min-width:0}
.sttit{font-size:12.5px;font-weight:500;color:var(--text2)}
.sttit.done{text-decoration:line-through;color:var(--text4)}
.stnote{font-size:11.5px;color:var(--text4);margin-top:2px}
.stacts{display:flex;gap:2px;opacity:0}
.steprow:hover .stacts{opacity:1}
.stib{background:none;border:none;cursor:pointer;color:var(--text4);font-size:12px;padding:2px 4px;border-radius:4px;transition:all .15s}
.stib:hover{color:var(--navy)}
.stib.del:hover{color:var(--danger)}

/* ── DOCUMENTS ── */
.doc-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.breadcrumb{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:7px 14px;flex:1;min-width:0;box-shadow:0 1px 3px rgba(11,25,41,0.05)}
.bc-item{font-size:12.5px;font-weight:600;color:var(--blue);cursor:pointer;transition:color .15s;display:flex;align-items:center;gap:4px}
.bc-item:hover{color:var(--navy)}
.bc-item.cur{color:var(--text3);cursor:default}
.bc-sep{color:var(--text4);font-size:12px}
.doc-zone{border:2px dashed var(--border2);border-radius:var(--rlg);padding:32px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:22px;background:var(--surface2)}
.doc-zone:hover,.doc-zone.drag{border-color:var(--blue2);background:var(--bluelt2)}
.doc-zone i{font-size:30px;color:var(--blue2);display:block;margin-bottom:10px}
.doc-zone p{font-size:14px;font-weight:600;color:var(--navy)}
.doc-zone span{font-size:12px;color:var(--text3)}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:11px}
.docitem{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 14px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;cursor:pointer;transition:all .18s;position:relative;box-shadow:0 1px 4px rgba(11,25,41,0.06)}
.docitem:hover{border-color:var(--border2);box-shadow:0 4px 14px rgba(11,25,41,0.12);transform:translateY(-2px)}
.docitem.folder{border-color:rgba(217,119,6,0.25);background:linear-gradient(135deg,#FFFBEB,#FEF3C7)}
.docitem.folder:hover{border-color:var(--amber)}
/* drag-over highlight */
.docitem.folder.drag-over{border-color:var(--blue);background:var(--bluelt2);transform:translateY(-3px);box-shadow:0 6px 20px rgba(37,99,235,0.2)}
.docitem.file.dragging{opacity:.4;transform:scale(.97)}
.docitem-icon{font-size:34px;margin-bottom:2px}
.docitem.folder .docitem-icon{color:var(--amber)}
.docitem.file .docitem-icon{color:var(--blue)}
.docitem-name{font-size:12px;font-weight:600;color:var(--navy);word-break:break-word;line-height:1.3}
.docitem-meta{font-size:10.5px;color:var(--text3);font-weight:500}
.docitem-acts{position:absolute;top:8px;right:8px;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.docitem:hover .docitem-acts{opacity:1}
.docitem-act{background:var(--surface);border:1px solid var(--border);border-radius:5px;cursor:pointer;color:var(--text3);font-size:12px;padding:3px 6px;transition:all .15s;box-shadow:0 1px 3px rgba(11,25,41,0.07)}
.docitem-act:hover{color:var(--navy);background:var(--bg2)}
.docitem-act.del:hover{color:var(--danger);background:var(--dangerbg);border-color:var(--danger)}
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;background:var(--greenbg);color:var(--green);border-radius:20px;padding:3px 8px;margin-top:3px}

/* ── DOC VIEWER ── */
.dv-overlay{display:none;position:fixed;inset:0;background:rgba(11,25,41,0.7);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.dv-overlay.open{display:flex}
.dv-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);width:90vw;max-width:900px;height:88vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(11,25,41,0.35)}
.dv-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);border-radius:var(--rlg) var(--rlg) 0 0}
.dv-title{font-size:14px;font-weight:600;color:var(--navy);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dv-body{flex:1;overflow:auto;padding:20px;display:flex;align-items:flex-start;justify-content:center}
.dv-body img{max-width:100%;border-radius:8px;box-shadow:0 4px 20px rgba(11,25,41,0.15)}
.dv-body iframe{width:100%;height:100%;border:none;border-radius:8px}
.dv-body .doc-text{font-size:13.5px;line-height:1.7;color:var(--text2);white-space:pre-wrap;background:var(--surface2);padding:24px;border-radius:8px;width:100%;max-width:720px;border:1px solid var(--border)}
.dv-body .doc-nopreview{text-align:center;padding:50px;color:var(--text3)}
.dv-body .doc-nopreview i{font-size:48px;display:block;margin-bottom:14px;color:var(--text4)}

/* ── CALENDAR ── */
.cal-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);min-width:210px;text-align:center;letter-spacing:.01em}
.cal-navbtn{background:var(--surface);border:1px solid var(--border);color:var(--text3);cursor:pointer;width:34px;height:34px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;box-shadow:0 1px 3px rgba(11,25,41,0.07)}
.cal-navbtn:hover{color:var(--navy);border-color:var(--border2);background:var(--bg2)}
.vtabs{display:flex;gap:3px;background:var(--bg2);border-radius:20px;padding:3px;border:1px solid var(--border)}
.vtab{font-size:12px;font-weight:600;padding:5px 15px;border-radius:20px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.vtab.on{background:var(--navy);color:#fff;box-shadow:0 2px 6px rgba(11,25,41,0.2)}
.cal-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
.cdow{font-size:10px;font-weight:700;color:var(--text4);text-align:center;padding:6px 0;letter-spacing:.08em;text-transform:uppercase}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ccell{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);min-height:90px;padding:8px;transition:all .15s}
.ccell:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(11,25,41,0.08)}
.ccell.today{border-color:var(--blue2);background:var(--bluelt2)}
.ccell.omonth{background:var(--bg);opacity:.55}
.cdaynum{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:5px}
.ccell.today .cdaynum{width:24px;height:24px;background:var(--navy);border-radius:50%;color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:5px;font-size:11.5px}
.cev{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s}
.cev:hover{opacity:.75}
.cev.admin{background:var(--bluelt);color:var(--blue)}
.cev.nesa{background:var(--dangerbg);color:var(--danger)}
.cev.staff{background:var(--greenbg);color:var(--green)}
.cev.reporting{background:var(--purplebg);color:var(--purple)}
.cev.event{background:var(--amberbg);color:var(--amber)}
.cev.meeting{background:var(--orangebg);color:var(--orange)}
.cev.manual{background:var(--bg2);color:var(--text2)}
.cev.doc{background:var(--greenbg);color:var(--green)}
.cal-wkhdrs{display:grid;gap:3px;margin-bottom:3px}
.cwkhdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;text-align:center;box-shadow:0 1px 3px rgba(11,25,41,0.05)}
.cwkday{font-size:10px;font-weight:700;color:var(--text4);letter-spacing:.07em;text-transform:uppercase}
.cwkdate{font-size:20px;font-weight:300;color:var(--navy);line-height:1.3}
.cwkhdr.today .cwkdate{color:var(--blue);font-weight:700}
.cal-wkgrid{display:grid;gap:3px}
.cwkcol{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:9px;min-height:150px;box-shadow:0 1px 3px rgba(11,25,41,0.04)}
.cal-dayview{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:0 2px 8px rgba(11,25,41,0.07)}
.cal-dayview h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--navy);margin-bottom:16px}
.dayev{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--rsm);margin-bottom:7px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--surface2)}
.dayev:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(11,25,41,0.08)}
.dayev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dayev-info{flex:1}
.dayev-title{font-size:13.5px;font-weight:600;color:var(--navy)}
.dayev-type{font-size:11.5px;color:var(--text3);margin-top:2px;font-weight:500}
.dayev-acts{display:flex;gap:4px;opacity:0;flex-shrink:0}
.dayev:hover .dayev-acts{opacity:1}

/* ── ARCHIVE ── */
.archive-note{font-size:13px;font-weight:500;color:var(--text3);margin-bottom:18px}
.tc.archived .tc-title{text-decoration:line-through;color:var(--text4)}
.tc.archived{opacity:.7}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 0;color:var(--text4);font-size:13.5px;font-weight:500}
.empty i{font-size:32px;display:block;margin-bottom:10px;color:var(--border2)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(11,25,41,0.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--rlg);padding:28px;width:460px;max-width:calc(100vw - 32px);max-height:calc(100vh - 48px);overflow-y:auto;box-shadow:0 28px 70px rgba(11,25,41,0.25)}
.modal h3{font-family:'DM Serif Display',serif;font-size:22px;color:var(--navy);margin-bottom:22px;letter-spacing:.01em}
.fg{margin-bottom:16px}
.fg label{font-size:10.5px;font-weight:700;color:var(--text3);display:block;margin-bottom:5px;letter-spacing:.08em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;font-size:13.5px;font-weight:500;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--rsm);padding:10px 12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue2);box-shadow:0 0 0 3px var(--bluelt);background:var(--surface)}
.fg select option{background:var(--surface);color:var(--text)}
.fg textarea{resize:vertical;min-height:72px;line-height:1.55}
.modal-acts{display:flex;gap:9px;margin-top:24px;justify-content:flex-end}
.btn-save{background:var(--navy);color:#fff;border:none;padding:10px 22px;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;box-shadow:0 2px 8px rgba(11,25,41,0.2)}
.btn-save:hover{background:var(--navy2)}
.btn-cancel{background:transparent;border:1px solid var(--border);padding:10px 17px;border-radius:var(--rsm);font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-cancel:hover{color:var(--navy);border-color:var(--border2);background:var(--bg2)}

/* ── SPINNER ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* --- MODERN BLUE UI UPGRADE --- */
.modern-card {
  background: linear-gradient(135deg, #ffffff, #f3f8ff);
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
  position: relative;
  overflow: hidden;
}

.modern-card::before {
  content: "";
  position: absolute;
  top: -60px;
  right: -60px;
  width: 220px;
  height: 220px;
  background: radial-gradient(circle, rgba(37, 99, 235, 0.15), transparent);
  border-radius: 50%;
}

.planner-input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  margin-top: 5px;
  margin-bottom: 10px;
}

.week-row {
  padding: 6px 10px;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 6px;
}
.term-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:18px;box-shadow:0 1px 6px rgba(11,25,41,0.05)}
.term-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;cursor:pointer;user-select:none}
.term-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--navy)}
.term-summary{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text3);flex-wrap:wrap}
.week-card{border-top:1px solid var(--bg2)}
.week-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;cursor:pointer;background:var(--surface2)}
.week-title{font-size:13px;font-weight:700;color:var(--navy)}
.week-count{font-size:12px;color:var(--text4)}
.week-body{padding:0 18px 16px 18px}
.week-body .tc{margin-bottom:10px}
.week-header .btn{font-size:11px;padding:5px 9px}
.week-toggle .xbtn{transform:rotate(0);transition:transform .2s}
.week-toggle.open .xbtn{transform:rotate(180deg)}

/* ── PRINT ── */
@media print{
  .sidebar,.topbar-right,.ibtn,.sib,.stib,.subacts,.stacts,.addinline,.btn,.docitem-acts,.cal-ctrl .btn,.cal-navbtn,.vtabs{display:none!important}
  .main{margin-left:0}body{background:#fff}
  .tc,.projcard,.sc,.tprog,.docitem,.ccell{break-inside:avoid}
}
</style>

// helpers
function ct(){const m=new Date().getMonth()+1;if(m<=4)return'T1';if(m<=7)return'T2';if(m<=9)return'T3';return'T4';}
function tpct(){const now=new Date(),t=ct(),s=new Date(TERMS[t].s),e=new Date(TERMS[t].e);return{term:t,pct:Math.min(100,Math.max(0,Math.round((now-s)/(e-s)*100)))};}
function fmtD(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function atv(){return tasks.filter(t=>!t.done);}
function archv(){return tasks.filter(t=>t.done);}
function scHTML(n,l,ic,icCls,strip,click){return`<div class="sc"${click?` onclick="${click}"`:''}><div class="sc-strip ${strip||icCls}"></div><div class="sc-icon ${icCls}"><i class="ti ti-${ic}"></i></div><div class="sc-n">${n}</div><div class="sc-l">${l}</div></div>`;}
function updBadge(){const el=document.getElementById('tbadge');if(el)el.textContent=atv().length;}
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

// nav
function go(v){
  view=v;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('ni-'+v);if(el)el.classList.add('active');
  const titles={dashboard:'Dashboard',tasks:'Tasks',term:'Term planner',projects:'Projects',docs:'Documents',cal:'Calendar',archive:'Done / Archive',settings:'Settings'};
  document.getElementById('ptitle').textContent=titles[v]||v;

}
function renderTopbar(){

          ${t.week?`<span class="dlabel"><i class="ti ti-list-check" style="font-size:11px"></i>${esc((TERM_WEEKS[t.term]||[]).find(w=>w.id===t.week)?.name||t.week)}</span>`:''}

function dropDocOnFolder(e,folderId){
  e.preventDefault();e.stopPropagation();

  if(d&&d.folder!==folderId){d.folder=folderId;render();}
}

// CALENDAR
function getAllEvents(){
  const evs=[];
  tasks.filter(t=>!t.done&&t.date).forEach(t=>evs.push({date:t.date,title:t.title,cat:t.cat,type:'task'}));
  docs.filter(d=>d.calEvents?.length).forEach(d=>d.calEvents.forEach(e=>evs.push({...e,type:'doc'})));
  calManual.forEach(e=>evs.push({...e,type:'manual'}));
  return evs;
}
function renderCal(){
  const evs=getAllEvents();
  const vt=`<div class="vtabs">
    <button class="vtab${calview==='month'?' on':''}" onclick="calview='month';render()">Month</button>
    <button class="vtab${calview==='week'?' on':''}" onclick="calview='week';render()">Week</button>
    <button class="vtab${calview==='day'?' on':''}" onclick="calview='day';render()">Day</button>
  </div>`;
  if(calview==='month') document.getElementById('content').innerHTML=renderMonth(evs,vt);
  else if(calview==='week') document.getElementById('content').innerHTML=renderWeek(evs,vt);
  else document.getElementById('content').innerHTML=renderDay(evs,vt);
}
function renderMonth(evs,vt){
  const y=caldate.getFullYear(),m=caldate.getMonth();
  const mn=caldate.toLocaleDateString('en-AU',{month:'long',year:'numeric'});
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  const today=new Date();today.setHours(0,0,0,0);
  let h=`<div class="cal-ctrl">
    <div class="cal-nav">
      <button class="cal-navbtn" onclick="caldate=new Date(${y},${m-1},1);render()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title">${mn}</div>
      <button class="cal-navbtn" onclick="caldate=new Date(${y},${m+1},1);render()"><i class="ti ti-chevron-right"></i></button>
    </div>${vt}</div>
  <div class="cal-dows">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cdow">${d}</div>`).join('')}</div>
  <div class="cal-grid">`;
  const total=Math.ceil((startDow+last.getDate())/7)*7;
  for(let i=0;i<total;i++){
    const dn=i-startDow+1,inM=dn>=1&&dn<=last.getDate();
    const cd=new Date(y,m,dn);cd.setHours(0,0,0,0);
    const isT=cd.getTime()===today.getTime();
    const dstr=ds(cd),de=evs.filter(e=>e.date===dstr);
    h+=`<div class="ccell${!inM?' omonth':''}${isT?' today':''}">
      <div class="cdaynum">${inM?dn:''}</div>
      ${de.slice(0,3).map(e=>`<div class="cev ${e.cat||e.type}" title="${esc(e.title)}">${esc(e.title)}</div>`).join('')}
      ${de.length>3?`<div style="font-size:10px;color:var(--text4);padding:1px 5px">+${de.length-3} more</div>`:''}
    </div>`;
  }
  return h+'</div>';
}
function renderWeek(evs,vt){
  const dow=(caldate.getDay()+6)%7;
  const ws=new Date(caldate);ws.setDate(caldate.getDate()-dow);ws.setHours(0,0,0,0);
  const days=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
  const today=new Date();today.setHours(0,0,0,0);
  const wl=`${days[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}`;
  let h=`<div class="cal-ctrl">
    <div class="cal-nav">
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()-7*86400000);render()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title" style="font-size:16px">${wl}</div>
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()+7*86400000);render()"><i class="ti ti-chevron-right"></i></button>
    </div>${vt}</div>
  <div class="cal-wkhdrs" style="grid-template-columns:repeat(7,1fr)">`;
  days.forEach(d=>{const isT=d.getTime()===today.getTime();h+=`<div class="cwkhdr${isT?' today':''}"><div class="cwkday">${d.toLocaleDateString('en-AU',{weekday:'short'})}</div><div class="cwkdate">${d.getDate()}</div></div>`;});
  h+=`</div><div class="cal-wkgrid" style="grid-template-columns:repeat(7,1fr)">`;
  days.forEach(d=>{const dstr=ds(d),de=evs.filter(e=>e.date===dstr);h+=`<div class="cwkcol">${de.map(e=>`<div class="cev ${e.cat||e.type}" style="margin-bottom:4px">${esc(e.title)}</div>`).join('')}${!de.length?`<div style="font-size:10px;color:var(--text4)">—</div>`:''}</div>`;});
  return h+'</div>';
}
function renderDay(evs,vt){
  const today=new Date();today.setHours(0,0,0,0);
  const d2=new Date(caldate);d2.setHours(0,0,0,0);
  const dstr=ds(d2),de=evs.filter(e=>e.date===dstr);
  const lbl=d2.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return `<div class="cal-ctrl">
    <div class="cal-nav">
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()-86400000);render()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title" style="font-size:16px">${lbl}</div>
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()+86400000);render()"><i class="ti ti-chevron-right"></i></button>
    </div>${vt}</div>
  <div class="cal-dayview"><h3>${d2.getTime()===today.getTime()?'Today':'Events'}</h3>
    ${!de.length?'<div style="font-size:13px;color:var(--text3);padding:10px 0">Nothing scheduled</div>':''}
    ${de.map(e=>`<div class="dayev">
      <div class="dayev-dot" style="background:${CAT_COLORS[e.cat||e.type]||'#aaa'}"></div>
      <div class="dayev-info"><div class="dayev-title">${esc(e.title)}</div><div class="dayev-type">${CATS[e.cat]||e.type==='doc'?'From document'+(e.source?' · '+e.source:''):'Manual entry'}${e.notes?' · '+esc(e.notes):''}</div></div>
      ${e.type==='manual'?`<div class="dayev-acts"><button class="ibtn" style="opacity:1" onclick="openModal('editCalEvent','${e.id}')"><i class="ti ti-edit"></i></button><button class="ibtn del" style="opacity:1" onclick="delCalEvent('${e.id}')"><i class="ti ti-trash"></i></button></div>`:''}
    </div>`).join('')}
  </div>`;
}

function handleFiles(files,targetFolder){
  const fld=targetFolder||docFolder;
  Array.from(files).forEach(f=>{
    const sl=f.size>1048576?`${(f.size/1048576).toFixed(1)} MB`:`${Math.round(f.size/1024)} KB`;

    docs.push({id:uid++,name:f.name,type:f.type||'',sizeLabel:sl,dateAdded:new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}),folder:fld,processed:false,processing:false,eventsFound:0,file:f,blobUrl,calEvents:[]});
  });

function handleTermImport(file){handleCSVImport(file,'Term Planner');}
function handleTaskImport(file){handleCSVImport(file,'Tasks');}
function handleCSVImport(file,label){
  if(!file.name.toLowerCase().endsWith('.csv')){alert('Please import a CSV file.');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    try{const rows=parseCSV(e.target.result);const imported=importTermRows(rows);alert(`${imported} rows imported to ${label}.`);render();}
    catch(err){console.error(err);alert('Unable to import the spreadsheet. Please check the CSV format.');}
  };
  reader.readAsText(file);
}
function handleProfileUpload(file){
  if(!file.type.startsWith('image/')){alert('Please choose an image file.');return;}
  const reader=new FileReader();
  reader.onload=e=>{profileImageUrl=e.target.result;render();};
  reader.readAsDataURL(file);
}
function clearProfileImage(){profileImageUrl='';render();}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(!lines.length) return [];
  const headings=lines.shift().split(',').map(h=>h.trim().toLowerCase());
  return lines.map(line=>{
    const values=line.split(',').map(v=>v.trim());
    const row={};
    headings.forEach((h,i)=>row[h]=values[i]||'');
    return row;
  });
}

function importTermRows(rows){
  let count=0;
  rows.forEach(row=>{
    const title=row.title||row.name||'';
    const category=row.category||row.cat||'admin';
    const term=row.term||'';
    const week=row.week||'';
    const date=row.date||'';
    const notes=row.notes||'';
    if(!title||!term) return;
    tasks.push({id:uid++,title,cat:category,term,week,date,notes,done:false,subtasks:[]});
    count++;
  });
  return count;
}

// adaptive glow: add left/right glow classes based on horizontal position
function applyAdaptiveGlow(){
  const els=document.querySelectorAll('.sc, .hero-metric, .sc-icon, .hero-icon');
  if(!els.length) return;
  const mid=window.innerWidth/2;
  els.forEach(el=>{
    el.classList.remove('glow-left','glow-right');
    const r=el.getBoundingClientRect();
    const cx=(r.left+r.right)/2;
    if(cx<mid) el.classList.add('glow-left'); else el.classList.add('glow-right');
    // trigger a short pulse animation
    el.classList.remove('glow-animate');
    // force reflow to restart animation
    void el.offsetWidth;
    el.classList.add('glow-animate');
    setTimeout(()=>{el.classList.remove('glow-animate');},900);
  });
}
window.addEventListener('resize', ()=>{applyAdaptiveGlow();});
document.addEventListener('DOMContentLoaded', ()=>{setTimeout(applyAdaptiveGlow,120);});

// AI extract
async function processDoc(docId){
  const d=docs.find(d=>d.id===docId);if(!d)return;
  d.processing=true;render();
  try{
    let mc;
    if(d.type.startsWith('image/')){const b64=await f2b64(d.file);mc=[{type:'image',source:{type:'base64',media_type:d.type,data:b64}},{type:'text',text:'Extract all dates, deadlines, tasks and events. Return JSON only: {"events":[{"date":"YYYY-MM-DD","title":"name"}]}'}];}
    else{const txt=await d.file.text().catch(()=>'');mc=[{type:'text',text:`Extract all dates, deadlines, tasks and events from this document. Return JSON only: {"events":[{"date":"YYYY-MM-DD","title":"name"}]}. Only include items with a specific date.\n\n${txt.slice(0,8000)}`}];}
    const resp=await callClaude(mc);
    try{const p=JSON.parse(resp.replace(/```json|```/g,'').trim());d.calEvents=(p.events||[]).filter(e=>e.date&&e.title).map(e=>({...e,cat:'doc',source:d.name}));d.eventsFound=d.calEvents.length;}catch{d.eventsFound=0;}
  }catch(e){console.error(e);}
  d.processing=false;d.processed=true;render();
}
async function f2b64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
async function callClaude(mc){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:mc}]})});const d=await r.json();return d.content?.map(i=>i.text||'').join('')||'';}

// modal
function openModal(mode,...args){
  mmode=mode;margs=args;
  document.getElementById('overlay').classList.add('open');
  const title=document.getElementById('mtitle'),body=document.getElementById('mbody');
  
  if(mode==='addTask'||mode==='editTask'){
    const t=mode==='editTask'?tasks.find(t=>t.id===args[0]):{term:args[0]||'T1',week:args[1]||''};
    title.textContent=mode==='addTask'?'Add task':'Edit task';
    body.innerHTML=taskForm(t||{});
  } else if(mode==='editWeek'){
    const term=args[0],weekId=args[1];
    const week=(TERM_WEEKS[term]||[]).find(w=>w.id===weekId)||{name:'',dates:''};
    title.textContent='Edit week';
    body.innerHTML=weekForm(term,week);
  } else if(mode==='addProject'||mode==='editProject'){
    const p=mode==='editProject'?projects.find(p=>p.id===args[0]):{};
    title.textContent=mode==='addProject'?'Add project':'Edit project';
    body.innerHTML=projForm(p||{});
  } else if(mode==='editSub'){
    const t=tasks.find(t=>t.id===args[0]),s=t?.subtasks.find(s=>s.id===args[1]);
    title.textContent='Edit step';body.innerHTML=`<div class="fg"><label>Step title</label><input type="text" id="f-sub" value="${esc(s?.title||'')}"></div>`;
  } else if(mode==='editStep'){
    const p=projects.find(p=>p.id===args[0]),s=p?.steps.find(s=>s.id===args[1]);
    title.textContent='Edit step';body.innerHTML=`<div class="fg"><label>Step title</label><input type="text" id="f-stit" value="${esc(s?.title||'')}"></div><div class="fg"><label>Note</label><input type="text" id="f-snote" value="${esc(s?.note||'')}"></div>`;
  } else if(mode==='addFolder'){
    title.textContent='New folder';body.innerHTML=`<div class="fg"><label>Folder name</label><input type="text" id="f-fname" placeholder="e.g. Board Meeting Notes"></div>`;
  } else if(mode==='addCalEvent'||mode==='editCalEvent'){
    const ev=mode==='editCalEvent'?calManual.find(e=>e.id===args[0]):null;
    title.textContent=mode==='addCalEvent'?'Add calendar event':'Edit calendar event';
    const catOpts=Object.keys(CATS).map(c=>`<option value="${c}"${ev?.cat===c?' selected':''}>${CATS[c]}</option>`).join('');
    body.innerHTML=`<div class="fg"><label>Event title</label><input type="text" id="f-etit" value="${esc(ev?.title||'')}" placeholder="e.g. Principal meeting"></div>
      <div class="fg"><label>Date</label><input type="date" id="f-edate" value="${ev?.date||''}"></div>
      <div class="fg"><label>Category</label><select id="f-ecat"><option value="manual">General</option>${catOpts}</select></div>
      <div class="fg"><label>Notes (optional)</label><textarea id="f-enotes">${ev?.notes||''}</textarea></div>`;
  } else if(mode==='uploadFiles'){
    // args[0] = array of File objects
    title.textContent='Upload files';
    const folderOpts=`<option value="root">Root (no folder)</option>`+folders.map(f=>`<option value="${f.id}">${f.name}</option>`).join('');
    body.innerHTML=`<div class="fg"><label>Save to folder</label><select id="f-upload-folder">${folderOpts}</select></div>
      <div style="font-size:12.5px;color:var(--text3);background:var(--bg2);border-radius:8px;padding:12px;margin-top:4px"><strong style="color:var(--navy)">${args[0].length} file${args[0].length!==1?'s':''} selected:</strong><br>${args[0].map(f=>`<span style="display:block;margin-top:3px">· ${esc(f.name)}</span>`).join('')}</div>`;
  }
  setTimeout(()=>document.querySelector('.modal input, .modal select')?.focus(),80);
}

function closeModal(){document.getElementById('overlay').classList.remove('open');mmode=null;margs=[];}
function saveModal(){
  if(mmode==='addTask'||mmode==='editTask'){
    const title=document.getElementById('f-title')?.value.trim();if(!title)return;
    const d={title,cat:document.getElementById('f-cat').value,term:document.getElementById('f-term').value,week:document.getElementById('f-week').value,date:document.getElementById('f-date').value,notes:document.getElementById('f-notes').value.trim()};
    if(mmode==='addTask') tasks.push({id:uid++,done:false,subtasks:[],...d});
    else{const t=tasks.find(t=>t.id===margs[0]);if(t)Object.assign(t,d);}
  } else if(mmode==='addProject'||mmode==='editProject'){
    const name=document.getElementById('f-pname')?.value.trim();if(!name)return;
    const d={name,icon:document.getElementById('f-picon').value};
    if(mmode==='addProject') projects.push({id:uid++,steps:[],...d});
    else{const p=projects.find(p=>p.id===margs[0]);if(p)Object.assign(p,d);}
  } else if(mmode==='editWeek'){
    const term=margs[0],weekId=margs[1];
    const week=(TERM_WEEKS[term]||[]).find(w=>w.id===weekId);
    if(week){week.name=document.getElementById('f-wname')?.value.trim()||week.name;week.dates=document.getElementById('f-wdates')?.value.trim()||week.dates;}
  } else if(mmode==='editSub'){
    const t=tasks.find(t=>t.id===margs[0]),s=t?.subtasks.find(s=>s.id===margs[1]);
    const v=document.getElementById('f-sub')?.value.trim();if(s&&v)s.title=v;
  } else if(mmode==='editStep'){
    const p=projects.find(p=>p.id===margs[0]),s=p?.steps.find(s=>s.id===margs[1]);
    if(s){s.title=document.getElementById('f-stit')?.value.trim()||s.title;s.note=document.getElementById('f-snote')?.value.trim()||'';}
  } else if(mmode==='addFolder'){
    const name=document.getElementById('f-fname')?.value.trim();if(!name)return;
    folders.push({id:'f'+(uid++),name,parent:docFolder});
  } else if(mmode==='addCalEvent'||mmode==='editCalEvent'){
    const title=document.getElementById('f-etit')?.value.trim();if(!title)return;
    const d={title,date:document.getElementById('f-edate').value,cat:document.getElementById('f-ecat').value,notes:document.getElementById('f-enotes')?.value.trim()||''};
    if(mmode==='addCalEvent') calManual.push({id:'ce'+(uid++),...d});
    else{const e=calManual.find(e=>e.id===margs[0]);if(e)Object.assign(e,d);}
  } else if(mmode==='uploadFiles'){
    const fld=document.getElementById('f-upload-folder')?.value||'root';
    handleFiles(margs[0],fld);
  }
  closeModal();render();
}

function taskForm(t){
  const co=Object.keys(CATS).map(c=>`<option value="${c}"${t.cat===c?' selected':''}>${CATS[c]}</option>`).join('');
  const to=Object.keys(TERMS).map(k=>`<option value="${k}"${t.term===k?' selected':''}>${TERMS[k].l}</option>`).join('');
  const wo=`<option value="">Unassigned</option>${WEEK_IDS.map(w=>{const weekName=(TERM_WEEKS[t.term]||[]).find(s=>s.id===w)?.name||w;return `<option value="${w}"${t.week===w?' selected':''}>${weekName}</option>`;}).join('')}`;
  return `<div class="fg"><label>Task title</label><input type="text" id="f-title" value="${esc(t.title||'')}" placeholder="e.g. Submit SCOUT data"></div>
    <div class="fg"><label>Category</label><select id="f-cat">${co}</select></div>
    <div class="fg"><label>Term</label><select id="f-term">${to}</select></div>
    <div class="fg"><label>Week</label><select id="f-week">${wo}</select></div>
    <div class="fg"><label>Due date</label><input type="date" id="f-date" value="${t.date||''}"></div>
    <div class="fg"><label>Notes (optional)</label><textarea id="f-notes">${t.notes||''}</textarea></div>`;
}

function weekForm(term,week){
  return `<div class="fg"><label>Week name</label><input type="text" id="f-wname" value="${esc(week.name||'')}" placeholder="e.g. Orientation week"></div>
    <div class="fg"><label>Dates</label><input type="text" id="f-wdates" value="${esc(week.dates||'')}" placeholder="e.g. 28 Jan – 3 Feb"></div>`;
}
function projForm(p){
  const io=ICONS.map(i=>`<option value="${i}"${p.icon===i?' selected':''}>${i.replace('ti-','')}</option>`).join('');
  return `<div class="fg"><label>Project name</label><input type="text" id="f-pname" value="${esc(p.name||'')}" placeholder="e.g. Curriculum Review 2026"></div>
    <div class="fg"><label>Icon</label><select id="f-picon">${io}</select></div>`;
}
function exportCSV(){
  const rows=[['Title','Category','Term','Week','Due Date','Status','Notes','Subtasks']];
  tasks.forEach(t=>{const s=(t.subtasks||[]).map(s=>`${s.title}(${s.done?'done':'pending'})`).join(' | ');rows.push([`"${t.title}"`,CATS[t.cat]||t.cat,t.term,t.week||'',t.date,t.done?'Done':'Active',`"${t.notes}"`,`"${s}"`]);});
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download=`admin-engine-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('dv-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDV();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeDV();}});

function generateWeeks() {
  const weeks = parseInt(document.getElementById("weeksInput").value);
  let current = document.getElementById("startWeek").value;

  let output = "";

  for (let i = 1; i <= weeks; i++) {
    output += `<div class="week-row">Week ${i} – Week ${current}</div>`;
    current = current === "A" ? "B" : "A";
  }

  document.getElementById("weekOutput").innerHTML = output;
}
  
renderTopbar();render();
</script>
