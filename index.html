<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trinity Anglican College — Admin Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1929;--n2:#0e1f35;--n3:#122540;--n4:#172d4d;--n5:#1d3660;
  --blue:#3B8BFF;--blue2:#60A5FF;--blue3:#85BDFF;--bluedim:rgba(59,139,255,.15);--blueglow:rgba(59,139,255,.07);
  --w:#fff;--w95:rgba(255,255,255,.95);--w80:rgba(255,255,255,.8);--w55:rgba(255,255,255,.55);
  --w30:rgba(255,255,255,.3);--w15:rgba(255,255,255,.15);--w08:rgba(255,255,255,.08);--w04:rgba(255,255,255,.04);
  --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2);
  --red:#FF6B6B;--reddim:rgba(255,107,107,.15);
  --green:#4ECDC4;--greendim:rgba(78,205,196,.15);
  --amber:#FFD166;--amberdim:rgba(255,209,102,.15);
  --purple:#C084FC;--purpledim:rgba(192,132,252,.15);
  --orange:#FB923C;--orangedim:rgba(251,146,60,.15);
  --sidebar:236px;--r:12px;--rsm:8px;--rlg:16px;
}
html,body{height:100%;background:var(--navy);color:var(--w);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.55;overflow-x:hidden}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar);background:var(--n2);border-right:1px solid var(--bd);position:fixed;left:0;top:0;height:100vh;display:flex;flex-direction:column;z-index:50;transition:transform .2s}
.brand{padding:18px 16px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px}
.brand-logo{width:44px;height:44px;border-radius:10px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;border:1px solid var(--bd2);padding:4px}
.brand-logo img{width:36px;height:36px;object-fit:contain;filter:brightness(0) invert(1)}
.brand-name{font-family:'DM Serif Display',serif;font-size:14.5px;color:var(--w);line-height:1.25;letter-spacing:.01em}
.brand-sub{font-size:10px;color:var(--w55);letter-spacing:.07em;margin-top:2px}
.nav{padding:12px 0;flex:1;overflow-y:auto}
.nav-sec{font-size:9px;font-weight:700;color:var(--w30);letter-spacing:.14em;text-transform:uppercase;padding:14px 16px 5px}
.ni{display:flex;align-items:center;gap:10px;padding:8.5px 16px;cursor:pointer;color:var(--w55);font-size:13px;font-weight:500;transition:all .15s;border-left:2.5px solid transparent;margin:1px 0}
.ni:hover{color:var(--w95);background:var(--w08)}
.ni.active{color:var(--w);background:var(--bluedim);border-left-color:var(--blue)}
.ni i{font-size:16px;width:18px;flex-shrink:0}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;background:var(--bluedim);color:var(--blue3);border-radius:20px;padding:1px 8px}
.sidebar-footer{padding:14px 16px;border-top:1px solid var(--bd)}
.sidebar-footer p{font-size:10px;color:var(--w30);line-height:1.7}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--n2);border-bottom:1px solid var(--bd);padding:13px 26px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-shrink:0}
.page-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--w);letter-spacing:.01em}
.topbar-right{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.content{padding:26px;flex:1;max-width:1400px}

/* ── BUTTONS ── */
.btn{font-size:12.5px;font-weight:500;padding:7px 14px;border-radius:var(--rsm);border:1px solid var(--bd);background:var(--w08);color:var(--w80);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn:hover{border-color:var(--bd2);background:var(--w15);color:var(--w)}
.btn.primary{background:var(--blue);color:var(--navy);border-color:var(--blue);font-weight:600}
.btn.primary:hover{background:var(--blue2);border-color:var(--blue2)}
.btn.sm{font-size:11.5px;padding:5px 11px}
.btn.ghost{background:transparent;border-color:transparent;color:var(--w55)}
.btn.ghost:hover{color:var(--w);background:var(--w08);border-color:transparent}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stats-grid.c3{grid-template-columns:repeat(3,1fr)}
.sc{background:var(--n3);border:1px solid var(--bd);border-radius:var(--r);padding:18px;position:relative;overflow:hidden;transition:all .15s}
.sc:hover{border-color:var(--bd2);transform:translateY(-1px)}
.sc::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,var(--blueglow),transparent 70%)}
.sc-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:17px}
.sc-icon.blue{background:var(--bluedim);color:var(--blue3)}
.sc-icon.green{background:var(--greendim);color:var(--green)}
.sc-icon.red{background:var(--reddim);color:var(--red)}
.sc-icon.amber{background:var(--amberdim);color:var(--amber)}
.sc-n{font-size:30px;font-weight:300;color:var(--w);line-height:1;margin-bottom:4px;letter-spacing:-.01em}
.sc-l{font-size:11.5px;font-weight:500;color:var(--w55)}

/* ── PROGRESS ── */
.tprog{background:var(--n3);border:1px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:24px;display:flex;align-items:center;gap:22px}
.tprog-body{flex:1}
.tprog-head{display:flex;justify-content:space-between;font-size:12.5px;font-weight:500;color:var(--w55);margin-bottom:10px}
.tprog-track{height:6px;background:var(--n5);border-radius:6px;overflow:hidden}
.tprog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--blue),var(--blue3));transition:width .6s cubic-bezier(.4,0,.2,1)}
.tprog-terms{display:flex;gap:5px;flex-shrink:0}
.tterm{font-size:10.5px;font-weight:600;padding:4px 11px;border-radius:20px;background:var(--w08);color:var(--w55);border:1px solid var(--bd)}
.tterm.cur{background:var(--bluedim);color:var(--blue3);border-color:rgba(59,139,255,.3)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.fb{font-size:12px;font-weight:500;padding:5px 13px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--w55);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.fb:hover{color:var(--w95);border-color:var(--bd2)}
.fb.on{background:var(--bluedim);color:var(--blue3);border-color:rgba(59,139,255,.3)}
.fdiv{width:1px;height:20px;background:var(--bd);margin:0 4px;align-self:center}

/* ── SECTION HEADER ── */
.shdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.shdr-title{font-family:'DM Serif Display',serif;font-size:15px;color:var(--w80);letter-spacing:.01em}
.spill{font-size:10.5px;font-weight:600;background:var(--w08);border-radius:20px;padding:2px 9px;color:var(--w55);border:1px solid var(--bd)}
.sline{flex:1;height:1px;background:var(--bd)}

/* ── TASK CARD ── */
.tc{background:var(--n3);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px;overflow:hidden;transition:all .15s}
.tc:hover{border-color:var(--bd2);background:var(--n4)}
.tc-main{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;cursor:pointer;user-select:none}
.chk{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--bd2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--navy);transition:all .15s}
.chk:hover{border-color:var(--blue);background:var(--bluedim)}
.chk.on{background:var(--blue);border-color:var(--blue)}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:13.5px;font-weight:500;color:var(--w95);margin-bottom:5px;line-height:1.4}
.tc-title.done{text-decoration:line-through;color:var(--w30)}
.tc-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:600;padding:2px 9px;border-radius:20px;letter-spacing:.02em}
.tag-admin{background:var(--bluedim);color:var(--blue3)}
.tag-nesa{background:var(--reddim);color:#FF9494}
.tag-staff{background:var(--greendim);color:var(--green)}
.tag-reporting{background:var(--purpledim);color:var(--purple)}
.tag-event{background:var(--amberdim);color:var(--amber)}
.tag-meeting{background:var(--orangedim);color:var(--orange)}
.tag-neutral{background:var(--w08);color:var(--w80)}
.dlabel{font-size:11px;font-weight:500;color:var(--w30);display:flex;align-items:center;gap:3px}
.dlabel.od{color:var(--red)}
.tc-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.xbtn{background:none;border:none;color:var(--w30);cursor:pointer;font-size:14px;padding:3px;transition:all .15s;line-height:1}
.xbtn:hover{color:var(--w95)}
.xbtn.open{transform:rotate(180deg)}
.ibtn{background:none;border:none;cursor:pointer;color:var(--w30);padding:4px 5px;border-radius:6px;font-size:14px;opacity:0;transition:all .15s}
.tc:hover .ibtn{opacity:1}
.ibtn:hover{color:var(--w);background:var(--w15)}
.ibtn.del:hover{color:var(--red);background:var(--reddim)}

/* ── SUBTASKS ── */
.subs{padding:4px 13px 10px 40px;border-top:1px solid var(--w04);background:rgba(0,0,0,.12)}
.subrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--w04)}
.subrow:last-child{border-bottom:none}
.schk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--bd2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--navy);transition:all .15s}
.schk.on{background:var(--blue);border-color:var(--blue)}
.subtit{font-size:12.5px;font-weight:500;color:var(--w80);flex:1}
.subtit.done{text-decoration:line-through;color:var(--w30)}
.subacts{display:flex;gap:2px;opacity:0}
.subrow:hover .subacts{opacity:1}
.sib{background:none;border:none;cursor:pointer;color:var(--w30);font-size:12px;padding:2px 4px;border-radius:4px;transition:all .15s}
.sib:hover{color:var(--w)}
.sib.del:hover{color:var(--red)}
.addinline{display:flex;align-items:center;gap:7px;margin-top:8px}
.addinline input{flex:1;font-size:12.5px;font-weight:500;background:var(--n4);border:1px solid var(--bd);color:var(--w);border-radius:var(--rsm);padding:6px 10px;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.addinline input::placeholder{color:var(--w30)}
.addinline input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluedim)}
.addinline button{font-size:12px;font-weight:600;padding:6px 12px;border-radius:var(--rsm);border:1px solid var(--bd);background:var(--w08);color:var(--w55);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.addinline button:hover{background:var(--bluedim);color:var(--blue3);border-color:rgba(59,139,255,.3)}

/* ── PROJECTS ── */
.projcard{background:var(--n3);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:all .15s}
.projcard:hover{border-color:var(--bd2);background:var(--n4)}
.projhdr{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;user-select:none}
.projicon{width:36px;height:36px;border-radius:10px;background:var(--bluedim);border:1px solid rgba(59,139,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;color:var(--blue3)}
.projinfo{flex:1;min-width:0}
.projname{font-family:'DM Serif Display',serif;font-size:15px;color:var(--w)}
.projsub{font-size:11.5px;font-weight:500;color:var(--w55);margin-top:2px}
.projright{display:flex;align-items:center;gap:8px}
.progwrap{display:flex;align-items:center;gap:8px}
.progbar{width:72px;height:5px;background:var(--n5);border-radius:5px;overflow:hidden}
.progfill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--blue),var(--blue3))}
.progpct{font-size:11px;font-weight:600;color:var(--w55);min-width:30px;text-align:right}
.projbody{padding:4px 15px 12px 62px;border-top:1px solid var(--w04);background:rgba(0,0,0,.1)}
.steprow{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid var(--w04)}
.steprow:last-child{border-bottom:none}
.stchk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--bd2);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--navy);transition:all .15s}
.stchk.on{background:var(--blue);border-color:var(--blue)}
.stbody{flex:1;min-width:0}
.sttit{font-size:12.5px;font-weight:500;color:var(--w80)}
.sttit.done{text-decoration:line-through;color:var(--w30)}
.stnote{font-size:11.5px;color:var(--w30);margin-top:2px}
.stacts{display:flex;gap:2px;opacity:0}
.steprow:hover .stacts{opacity:1}
.stib{background:none;border:none;cursor:pointer;color:var(--w30);font-size:12px;padding:2px 4px;border-radius:4px;transition:all .15s}
.stib:hover{color:var(--w)}
.stib.del:hover{color:var(--red)}

/* ── DOCUMENTS ── */
.doc-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.breadcrumb{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.bc-item{font-size:13px;font-weight:500;color:var(--blue3);cursor:pointer;transition:color .15s}
.bc-item:hover{color:var(--w)}
.bc-item.cur{color:var(--w55);cursor:default}
.bc-sep{color:var(--w30);font-size:12px}
.doc-upload-zone{border:2px dashed var(--bd2);border-radius:var(--rlg);padding:36px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:22px;background:var(--blueglow)}
.doc-upload-zone:hover,.doc-upload-zone.drag{border-color:var(--blue);background:var(--bluedim)}
.doc-upload-zone i{font-size:32px;color:var(--blue3);display:block;margin-bottom:10px}
.doc-upload-zone p{font-size:14px;font-weight:600;color:var(--w95)}
.doc-upload-zone span{font-size:12px;color:var(--w55)}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.docitem{background:var(--n3);border:1px solid var(--bd);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:pointer;transition:all .15s;position:relative}
.docitem:hover{border-color:var(--bd2);background:var(--n4);transform:translateY(-1px)}
.docitem.folder{border-color:rgba(255,209,102,.2)}
.docitem.folder:hover{border-color:var(--amber)}
.docitem-icon{font-size:32px;margin-bottom:2px}
.docitem.folder .docitem-icon{color:var(--amber)}
.docitem.file .docitem-icon{color:var(--blue3)}
.docitem-name{font-size:12px;font-weight:600;color:var(--w95);word-break:break-word;line-height:1.3}
.docitem-meta{font-size:10.5px;color:var(--w30);font-weight:500}
.docitem-acts{position:absolute;top:8px;right:8px;display:flex;gap:2px;opacity:0;transition:opacity .15s}
.docitem:hover .docitem-acts{opacity:1}
.docitem-act{background:var(--n5);border:1px solid var(--bd);border-radius:5px;cursor:pointer;color:var(--w55);font-size:12px;padding:2px 5px;transition:all .15s}
.docitem-act:hover{color:var(--w);background:var(--w15)}
.docitem-act.del:hover{color:var(--red);background:var(--reddim)}
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;background:var(--greendim);color:var(--green);border-radius:20px;padding:3px 8px;margin-top:4px}

/* ── DOC VIEWER ── */
.doc-viewer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.doc-viewer-overlay.open{display:flex}
.doc-viewer{background:var(--n3);border:1px solid var(--bd2);border-radius:var(--rlg);width:90vw;max-width:860px;height:88vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.6)}
.doc-viewer-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--bd);flex-shrink:0}
.doc-viewer-title{font-size:14.5px;font-weight:600;color:var(--w95);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-viewer-body{flex:1;overflow:auto;padding:20px;display:flex;align-items:flex-start;justify-content:center}
.doc-viewer-body img{max-width:100%;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.doc-viewer-body iframe{width:100%;height:100%;border:none;border-radius:8px}
.doc-viewer-body .doc-text{font-size:13.5px;line-height:1.7;color:var(--w80);white-space:pre-wrap;font-family:'DM Sans',sans-serif;background:var(--n2);padding:20px;border-radius:8px;width:100%;max-width:720px}
.doc-viewer-body .doc-nopreview{text-align:center;padding:40px;color:var(--w55)}
.doc-viewer-body .doc-nopreview i{font-size:48px;display:block;margin-bottom:14px;color:var(--w30)}

/* ── CALENDAR ── */
.cal-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.cal-nav{display:flex;align-items:center;gap:10px}
.cal-title{font-family:'DM Serif Display',serif;font-size:22px;color:var(--w);min-width:210px;text-align:center;letter-spacing:.01em}
.cal-navbtn{background:var(--w08);border:1px solid var(--bd);color:var(--w55);cursor:pointer;width:32px;height:32px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s}
.cal-navbtn:hover{color:var(--w);border-color:var(--bd2);background:var(--w15)}
.vtabs{display:flex;gap:3px;background:var(--n3);border-radius:20px;padding:3px;border:1px solid var(--bd)}
.vtab{font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;border:none;background:transparent;color:var(--w55);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.vtab.on{background:var(--blue);color:var(--navy)}
.cal-month-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:5px}
.cdow{font-size:10px;font-weight:700;color:var(--w30);text-align:center;padding:6px 0;letter-spacing:.08em;text-transform:uppercase}
.cal-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.ccell{background:var(--n3);border:1px solid var(--bd);border-radius:var(--rsm);min-height:92px;padding:7px;transition:all .15s}
.ccell:hover{border-color:var(--bd2)}
.ccell.today{border-color:rgba(59,139,255,.4);background:var(--n4)}
.ccell.omonth{opacity:.28}
.cdaynum{font-size:12px;font-weight:600;color:var(--w55);margin-bottom:5px}
.ccell.today .cdaynum{width:23px;height:23px;background:var(--blue);border-radius:50%;color:var(--navy);font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:5px;font-size:11.5px}
.cev{font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cev:hover{opacity:.8}
.cev.admin{background:var(--bluedim);color:var(--blue3)}
.cev.nesa{background:var(--reddim);color:#FF9494}
.cev.staff{background:var(--greendim);color:var(--green)}
.cev.reporting{background:var(--purpledim);color:var(--purple)}
.cev.event{background:var(--amberdim);color:var(--amber)}
.cev.meeting{background:var(--orangedim);color:var(--orange)}
.cev.manual{background:rgba(255,255,255,.1);color:var(--w80)}
.cev.doc{background:var(--greendim);color:var(--green)}
.cal-week-hdrs{display:grid;gap:3px;margin-bottom:3px}
.cwkhdr{background:var(--n3);border:1px solid var(--bd);border-radius:var(--rsm);padding:8px;text-align:center}
.cwkday{font-size:10px;font-weight:700;color:var(--w30);letter-spacing:.07em;text-transform:uppercase}
.cwkdate{font-size:18px;font-weight:300;color:var(--w);line-height:1.3}
.cwkhdr.today .cwkdate{color:var(--blue);font-weight:700}
.cal-week-grid{display:grid;gap:3px}
.cwkcol{background:var(--n3);border:1px solid var(--bd);border-radius:var(--rsm);padding:9px;min-height:150px}
.cal-day-view{background:var(--n3);border:1px solid var(--bd);border-radius:var(--r);padding:22px}
.cal-day-view h3{font-family:'DM Serif Display',serif;font-size:20px;color:var(--w);margin-bottom:16px;letter-spacing:.01em}
.dayev{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--rsm);margin-bottom:7px;border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.dayev:hover{border-color:var(--bd2);background:var(--n4)}
.dayev .dayev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dayev-info{flex:1}
.dayev-title{font-size:13.5px;font-weight:500;color:var(--w95)}
.dayev-type{font-size:11.5px;color:var(--w55);margin-top:2px;font-weight:500}
.dayev-acts{display:flex;gap:4px;opacity:0;flex-shrink:0}
.dayev:hover .dayev-acts{opacity:1}

/* ── ARCHIVE ── */
.archive-note{font-size:13px;font-weight:500;color:var(--w55);margin-bottom:18px}
.tc.archived .tc-title{text-decoration:line-through;color:var(--w30)}
.tc.archived{opacity:.65}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 0;color:var(--w30);font-size:13.5px;font-weight:500}
.empty i{font-size:32px;display:block;margin-bottom:10px;color:var(--w15)}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.overlay.open{display:flex}
.modal{background:var(--n3);border:1px solid var(--bd2);border-radius:var(--rlg);padding:26px;width:440px;max-width:calc(100vw - 32px);max-height:calc(100vh - 48px);overflow-y:auto;box-shadow:0 28px 70px rgba(0,0,0,.55)}
.modal h3{font-family:'DM Serif Display',serif;font-size:21px;color:var(--w);margin-bottom:20px;letter-spacing:.01em}
.fg{margin-bottom:15px}
.fg label{font-size:10.5px;font-weight:700;color:var(--w30);display:block;margin-bottom:5px;letter-spacing:.09em;text-transform:uppercase}
.fg input,.fg select,.fg textarea{width:100%;font-size:13.5px;font-weight:500;background:var(--n2);border:1px solid var(--bd);color:var(--w);border-radius:var(--rsm);padding:9px 12px;font-family:'DM Sans',sans-serif;transition:all .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--bluedim)}
.fg select option{background:var(--n2);color:var(--w)}
.fg textarea{resize:vertical;min-height:70px;line-height:1.55}
.modal-acts{display:flex;gap:9px;margin-top:22px;justify-content:flex-end}
.btn-save{background:var(--blue);color:var(--navy);border:none;padding:9px 22px;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-save:hover{background:var(--blue2)}
.btn-cancel{background:transparent;border:1px solid var(--bd);padding:9px 17px;border-radius:var(--rsm);font-size:13px;font-weight:500;cursor:pointer;color:var(--w55);font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-cancel:hover{color:var(--w);border-color:var(--bd2)}

/* ── SPINNER ── */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--w15);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--w15);border-radius:4px}

/* ── PRINT ── */
@media print{
  .sidebar,.topbar-right,.ibtn,.sib,.stib,.subacts,.stacts,.addinline,.btn,.docitem-acts,.cal-ctrl button,.cal-navbtn,.vtabs{display:none!important}
  .main{margin-left:0}body{background:#fff;color:#000}
  .tc,.projcard,.sc,.tprog,.docitem,.ccell{background:#f5f7fa;border:1px solid #ddd;break-inside:avoid}
  .tc-title,.projname,.page-title,.sc-l,.sc-n,.cal-title,.shdr-title{color:#000!important}
  .subs,.projbody{display:block!important}
}
</style>
</head>

// ── HELPERS ──
function ct(){const m=new Date().getMonth()+1;if(m<=4)return'T1';if(m<=7)return'T2';if(m<=9)return'T3';return'T4';}
function tpct(){const now=new Date(),t=ct(),s=new Date(TERMS[t].s),e=new Date(TERMS[t].e);return{term:t,pct:Math.min(100,Math.max(0,Math.round((now-s)/(e-s)*100)))};}
function fmtD(d){if(!d)return'';return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function atv(){return tasks.filter(t=>!t.done);}
function archv(){return tasks.filter(t=>t.done);}
function sc(n,l,ic,icCls){return`<div class="sc"><div class="sc-icon ${icCls}"><i class="ti ti-${ic}"></i></div><div class="sc-n">${n}</div><div class="sc-l">${l}</div></div>`;}
function updBadge(){const el=document.getElementById('tbadge');if(el)el.textContent=atv().length;}

// ── NAV ──
function go(v){
  view=v;
  document.querySelectorAll('.ni').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('ni-'+v);if(el)el.classList.add('active');
  const titles={dashboard:'Dashboard',tasks:'Tasks',term:'Term planner',projects:'Projects',docs:'Documents',cal:'Calendar',archive:'Done / Archive'};
  document.getElementById('ptitle').textContent=titles[v]||v;
  renderTopbar();render();
}
function renderTopbar(){
  const el=document.getElementById('tbbtns');
  const pr=`<button class="btn" onclick="window.print()"><i class="ti ti-printer"></i> Print</button>`;
  const csv=`<button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button>`;
  const add=`<button class="btn primary" onclick="openModal('addTask')"><i class="ti ti-plus"></i> Add task</button>`;
  if(view==='dashboard') el.innerHTML=add;
  else if(view==='tasks') el.innerHTML=csv+pr+add;
  else if(view==='term') el.innerHTML=csv+pr+add;
  else if(view==='projects') el.innerHTML=pr+`<button class="btn primary" onclick="openModal('addProject')"><i class="ti ti-plus"></i> Add project</button>`;
  else if(view==='docs') el.innerHTML=`<button class="btn" onclick="openModal('addFolder')"><i class="ti ti-folder-plus"></i> New folder</button><button class="btn primary" onclick="document.getElementById('file-input').click()"><i class="ti ti-upload"></i> Upload</button>`;
  else if(view==='cal') el.innerHTML=`<button class="btn" onclick="caldate=new Date();render()"><i class="ti ti-home"></i> Today</button><button class="btn primary" onclick="openModal('addCalEvent')"><i class="ti ti-plus"></i> Add event</button>`;
  else if(view==='archive') el.innerHTML=`<button class="btn" onclick="clearArchive()"><i class="ti ti-trash"></i> Clear all</button>${pr}`;
}

// ── RENDER ──
function render(){
  updBadge();
  if(view==='dashboard') renderDash();
  else if(view==='tasks') renderTasks();
  else if(view==='term') renderTerm();
  else if(view==='projects') renderProjects();
  else if(view==='docs') renderDocs();
  else if(view==='cal') renderCal();
  else if(view==='archive') renderArchive();
}

// ── DASHBOARD ──
function renderDash(){
  const{term,pct}=tpct();
  const active=atv(),total=active.length;
  const overdue=active.filter(t=>t.date&&new Date(t.date)<new Date()).length;
  const cterm=active.filter(t=>t.term===term).length,done=tasks.filter(t=>t.done).length;
  let h=`<div class="stats-grid">
    ${sc(total,'Active tasks','list-check','blue')}
    ${sc(done,'Completed','circle-check','green')}
    ${sc(overdue,'Overdue','alert-circle','red')}
    ${sc(cterm,'This term','calendar','amber')}
  </div>
  <div class="tprog">
    <div class="tprog-body">
      <div class="tprog-head"><span>${TERMS[term].l} · ${TERMS[term].d}</span><span>${pct}% complete</span></div>
      <div class="tprog-track"><div class="tprog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="tprog-terms">${Object.keys(TERMS).map(k=>`<div class="tterm${k===term?' cur':''}">${k}</div>`).join('')}</div>
  </div>`;

  const upcoming=active.filter(t=>t.date).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  h+=`<div style="margin-bottom:26px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="shdr-title">Upcoming tasks</div>
      <button class="btn ghost sm" onclick="go('tasks')">View all <i class="ti ti-arrow-right" style="font-size:12px"></i></button>
    </div>`;
  if(!upcoming.length) h+='<div class="empty" style="padding:18px 0"><i class="ti ti-circle-check"></i>All caught up!</div>';
  else upcoming.forEach(t=>{h+=tcHtml(t);});
  h+='</div>';

  h+=`<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="shdr-title">Projects</div>
      <button class="btn ghost sm" onclick="go('projects')">View all <i class="ti ti-arrow-right" style="font-size:12px"></i></button>
    </div>`;
  if(!projects.length) h+='<div class="empty" style="padding:18px 0"><i class="ti ti-folder"></i>No projects yet</div>';
  else projects.slice(0,3).forEach(p=>{
    const d=p.steps.filter(s=>s.done).length,tot=p.steps.length,pct2=tot?Math.round(d/tot*100):0;
    h+=`<div class="projcard" onclick="go('projects')" style="cursor:pointer">
      <div class="projhdr">
        <div class="projicon"><i class="ti ${p.icon}"></i></div>
        <div class="projinfo"><div class="projname">${esc(p.name)}</div><div class="projsub">${d} of ${tot} steps complete</div></div>
        <div class="projright"><div class="progwrap"><div class="progbar"><div class="progfill" style="width:${pct2}%"></div></div><span class="progpct">${pct2}%</span></div></div>
      </div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

// ── TASKS (flat, active only) ──
function renderTasks(){
  const vis=tf==='all'?atv():atv().filter(t=>t.cat===tf);
  let h=`<div class="filter-bar">${['all',...Object.keys(CATS)].map(f=>`<button class="fb${tf===f?' on':''}" onclick="setTF('${f}')">${f==='all'?'All tasks':CATS[f]}</button>`).join('')}</div>`;
  if(!vis.length) h+='<div class="empty"><i class="ti ti-circle-check"></i>No tasks — you\'re all caught up!</div>';
  else vis.forEach(t=>{h+=tcHtml(t);});
  document.getElementById('content').innerHTML=h;
}

// ── TERM PLANNER ──
function renderTerm(){
  const{term,pct}=tpct();
  let h=`<div class="tprog" style="margin-bottom:20px">
    <div class="tprog-body">
      <div class="tprog-head"><span>${TERMS[term].l} · ${TERMS[term].d}</span><span>${pct}% complete</span></div>
      <div class="tprog-track"><div class="tprog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="tprog-terms">${Object.keys(TERMS).map(k=>`<div class="tterm${k===term?' cur':''}">${k}</div>`).join('')}</div>
  </div>
  <div class="filter-bar">${['all',...Object.keys(CATS)].map(f=>`<button class="fb${tf===f?' on':''}" onclick="setTF('${f}')">${f==='all'?'All':CATS[f]}</button>`).join('')}<div class="fdiv"></div>${Object.keys(TERMS).map(k=>`<button class="fb${termf===k?' on':''}" onclick="setTermF('${k}')">${TERMS[k].l}</button>`).join('')}</div>`;
  let vis=atv();
  if(tf!=='all') vis=vis.filter(t=>t.cat===tf);
  if(termf!=='all') vis=vis.filter(t=>t.term===termf);
  const byT={};vis.forEach(t=>{if(!byT[t.term])byT[t.term]=[];byT[t.term].push(t);});
  let any=false;
  ['T1','T2','T3','T4'].forEach(tk=>{
    if(!byT[tk]?.length) return; any=true;
    h+=`<div style="margin-bottom:22px"><div class="shdr"><span class="shdr-title">${TERMS[tk].l}</span><span class="spill">${TERMS[tk].d}</span><span class="spill">${byT[tk].length} task${byT[tk].length!==1?'s':''}</span><div class="sline"></div></div>`;
    byT[tk].forEach(t=>{h+=tcHtml(t);});
    h+='</div>';
  });
  if(!any) h+='<div class="empty"><i class="ti ti-clipboard-x"></i>No tasks found</div>';
  document.getElementById('content').innerHTML=h;
}

// ── TASK HTML ──
function tcHtml(t,archived=false){
  const od=!t.done&&t.date&&new Date(t.date)<new Date();
  const isOpen=expT[t.id];
  const sd=t.subtasks?t.subtasks.filter(s=>s.done).length:0;
  return `<div class="tc${archived?' archived':''}">
    <div class="tc-main" onclick="toggleT(${t.id})">
      <div class="chk${t.done?' on':''}" onclick="checkTask(${t.id});event.stopPropagation()">${t.done?'<i class="ti ti-check"></i>':''}</div>
      <div class="tc-body">
        <div class="tc-title${t.done?' done':''}">${esc(t.title)}</div>
        <div class="tc-meta">
          <span class="tag tag-${t.cat}">${CATS[t.cat]||t.cat}</span>
          <span class="tag tag-neutral">${TERMS[t.term]?.l||t.term}</span>
          ${t.date?`<span class="dlabel${od?' od':''}"><i class="ti ti-${od?'alert-circle':'calendar-event'}" style="font-size:11px"></i>${fmtD(t.date)}</span>`:''}
          ${t.subtasks?.length?`<span class="dlabel"><i class="ti ti-subtask" style="font-size:11px"></i>${sd}/${t.subtasks.length}</span>`:''}
          ${t.notes?`<span class="dlabel" title="${esc(t.notes)}"><i class="ti ti-note" style="font-size:11px"></i></span>`:''}
        </div>
      </div>
      <div class="tc-right">
        <button class="ibtn" onclick="openModal('editTask',${t.id});event.stopPropagation()"><i class="ti ti-edit"></i></button>
        <button class="ibtn del" onclick="delTask(${t.id});event.stopPropagation()"><i class="ti ti-trash"></i></button>
        <button class="xbtn${isOpen?' open':''}" onclick="toggleT(${t.id});event.stopPropagation()"><i class="ti ti-chevron-down"></i></button>
      </div>
    </div>
    ${isOpen?`<div class="subs">
      ${(t.subtasks||[]).map(s=>`<div class="subrow">
        <div class="schk${s.done?' on':''}" onclick="checkSub(${t.id},${s.id})">${s.done?'<i class="ti ti-check"></i>':''}</div>
        <span class="subtit${s.done?' done':''}">${esc(s.title)}</span>
        <div class="subacts">
          <button class="sib" onclick="openModal('editSub',${t.id},${s.id})"><i class="ti ti-edit"></i></button>
          <button class="sib del" onclick="delSub(${t.id},${s.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>`).join('')}
      <div class="addinline">
        <input type="text" placeholder="Add a step…" id="ns-${t.id}" onkeydown="if(event.key==='Enter')addSub(${t.id})">
        <button onclick="addSub(${t.id})">Add</button>
      </div>
    </div>`:''}
  </div>`;
}

// ── ARCHIVE ──
function renderArchive(){
  const arch=archv();
  let h='';
  if(!arch.length) h='<div class="empty"><i class="ti ti-archive"></i>No completed tasks yet</div>';
  else{
    h=`<p class="archive-note">${arch.length} completed task${arch.length!==1?'s':''} — untick to restore to active</p>`;
    const byT={};arch.forEach(t=>{if(!byT[t.term])byT[t.term]=[];byT[t.term].push(t);});
    ['T1','T2','T3','T4'].forEach(tk=>{
      if(!byT[tk]?.length) return;
      h+=`<div style="margin-bottom:20px"><div class="shdr"><span class="shdr-title">${TERMS[tk].l}</span><span class="spill">${byT[tk].length}</span><div class="sline"></div></div>`;
      byT[tk].forEach(t=>{h+=tcHtml(t,true);});
      h+='</div>';
    });
  }
  document.getElementById('content').innerHTML=h;
}

// ── PROJECTS ──
function renderProjects(){
  const ds=projects.reduce((a,p)=>a+p.steps.filter(s=>s.done).length,0),as=projects.reduce((a,p)=>a+p.steps.length,0);
  let h=`<div class="stats-grid c3">${sc(projects.length,'Projects','folder-filled','blue')}${sc(ds,'Steps done','circle-check','green')}${sc(as-ds,'Steps remaining','list','amber')}</div>`;
  if(!projects.length) h+='<div class="empty"><i class="ti ti-folder"></i>No projects yet</div>';
  projects.forEach(p=>{
    const d=p.steps.filter(s=>s.done).length,tot=p.steps.length,pct=tot?Math.round(d/tot*100):0,isO=expP[p.id];
    h+=`<div class="projcard">
      <div class="projhdr" onclick="toggleP(${p.id})">
        <div class="projicon"><i class="ti ${p.icon}"></i></div>
        <div class="projinfo"><div class="projname">${esc(p.name)}</div><div class="projsub">${d} of ${tot} steps complete</div></div>
        <div class="projright">
          <div class="progwrap"><div class="progbar"><div class="progfill" style="width:${pct}%"></div></div><span class="progpct">${pct}%</span></div>
          <button class="ibtn" onclick="openModal('editProject',${p.id});event.stopPropagation()"><i class="ti ti-edit"></i></button>
          <button class="ibtn del" onclick="delProject(${p.id});event.stopPropagation()"><i class="ti ti-trash"></i></button>
          <button class="xbtn${isO?' open':''}" onclick="toggleP(${p.id});event.stopPropagation()"><i class="ti ti-chevron-down"></i></button>
        </div>
      </div>
      ${isO?`<div class="projbody">
        ${p.steps.map(s=>`<div class="steprow">
          <div class="stchk${s.done?' on':''}" onclick="checkStep(${p.id},${s.id})">${s.done?'<i class="ti ti-check"></i>':''}</div>
          <div class="stbody"><div class="sttit${s.done?' done':''}">${esc(s.title)}</div>${s.note?`<div class="stnote">${esc(s.note)}</div>`:''}</div>
          <div class="stacts">
            <button class="stib" onclick="openModal('editStep',${p.id},${s.id})"><i class="ti ti-edit"></i></button>
            <button class="stib del" onclick="delStep(${p.id},${s.id})"><i class="ti ti-trash"></i></button>
          </div>
        </div>`).join('')}
        <div class="addinline">
          <input type="text" placeholder="Add a step…" id="np-${p.id}" onkeydown="if(event.key==='Enter')addStep(${p.id})">
          <button onclick="addStep(${p.id})">Add</button>
        </div>
      </div>`:''}
    </div>`;
  });
  document.getElementById('content').innerHTML=h;
}

// ── DOCUMENTS ──
function renderDocs(){
  const curFolders=folders.filter(f=>f.parent===docFolder);
  const curDocs=docs.filter(d=>d.folder===docFolder);
  // breadcrumb
  let bcHtml='<div class="bc-item" onclick="docFolder=\'root\';render()"><i class="ti ti-home" style="font-size:13px"></i></div>';
  if(docFolder!=='root'){const f=folders.find(f=>f.id===docFolder);if(f)bcHtml+=`<span class="bc-sep">/</span><div class="bc-item cur">${esc(f.name)}</div>`;}

  let h=`<div class="doc-toolbar">
    <div class="breadcrumb">${bcHtml}</div>
  </div>
  <div class="doc-upload-zone" id="dropzone" onclick="document.getElementById('file-input').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
    <i class="ti ti-cloud-upload"></i>
    <p>Click to upload or drag & drop files here</p>
    <span>PDF, Word, Excel, images, any file type</span>
  </div>
  <div class="doc-grid">`;

  // folders first
  curFolders.forEach(f=>{
    h+=`<div class="docitem folder" onclick="docFolder='${f.id}';render()">
      <div class="docitem-acts">
        <button class="docitem-act del" onclick="delFolder('${f.id}');event.stopPropagation()"><i class="ti ti-trash"></i></button>
      </div>
      <div class="docitem-icon"><i class="ti ti-folder-filled"></i></div>
      <div class="docitem-name">${esc(f.name)}</div>
      <div class="docitem-meta">${docs.filter(d=>d.folder===f.id).length} file${docs.filter(d=>d.folder===f.id).length!==1?'s':''}</div>
    </div>`;
  });

  // docs
  curDocs.forEach(d=>{
    const icon=d.type.includes('pdf')?'ti-file-type-pdf':d.type.includes('image')?'ti-photo':d.name.match(/\.xlsx?/i)?'ti-file-type-xls':d.name.match(/\.docx?/i)?'ti-file-type-docx':'ti-file-text';
    h+=`<div class="docitem file" onclick="openDocViewer(${d.id})">
      <div class="docitem-acts" onclick="event.stopPropagation()">
        <button class="docitem-act" onclick="processDoc(${d.id})" title="Extract to calendar"><i class="ti ti-sparkles"></i></button>
        <button class="docitem-act del" onclick="delDoc(${d.id})"><i class="ti ti-trash"></i></button>
      </div>
      <div class="docitem-icon"><i class="ti ${icon}"></i></div>
      <div class="docitem-name" title="${esc(d.name)}">${esc(d.name)}</div>
      <div class="docitem-meta">${d.sizeLabel} · ${d.dateAdded}</div>
      ${d.processed?`<div class="ai-badge"><i class="ti ti-sparkles" style="font-size:10px"></i>${d.eventsFound} event${d.eventsFound!==1?'s':''}</div>`:''}
      ${d.processing?`<div style="margin-top:5px;font-size:11px;color:var(--w55);display:flex;align-items:center;gap:5px"><span class="spin"></span>Extracting…</div>`:''}
    </div>`;
  });

  if(!curFolders.length&&!curDocs.length) h+='<div style="grid-column:1/-1;text-align:center;padding:30px 0;color:var(--w30);font-size:13px"><i class="ti ti-files" style="font-size:28px;display:block;margin-bottom:8px"></i>This folder is empty</div>';
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

// doc viewer
function openDocViewer(docId){
  const d=docs.find(d=>d.id===docId);if(!d)return;
  viewingDocId=docId;
  document.getElementById('dv-title').textContent=d.name;
  const body=document.getElementById('dv-body');
  if(d.type.startsWith('image/')){
    body.innerHTML=`<img src="${d.blobUrl}" alt="${esc(d.name)}">`;
  } else if(d.type==='application/pdf'){
    body.innerHTML=`<iframe src="${d.blobUrl}"></iframe>`;
  } else if(d.type.startsWith('text/')||d.name.match(/\.(txt|csv|md)$/i)){
    // read text
    const fr=new FileReader();
    fr.onload=e=>{body.innerHTML=`<div class="doc-text">${esc(e.target.result)}</div>`;};
    fr.readAsText(d.file);
    body.innerHTML='<div class="doc-nopreview"><div class="spin"></div></div>';
  } else {
    body.innerHTML=`<div class="doc-nopreview"><i class="ti ti-file"></i><p style="font-size:14px;font-weight:600;color:var(--w80);margin-bottom:8px">${esc(d.name)}</p><p style="font-size:13px;color:var(--w55)">Preview not available for this file type.</p><button class="btn primary" style="margin:16px auto 0;display:flex" onclick="downloadDoc()"><i class="ti ti-download"></i> Download file</button></div>`;
  }
  document.getElementById('dv-overlay').classList.add('open');
}
function closeDocViewer(){document.getElementById('dv-overlay').classList.remove('open');viewingDocId=null;}
function downloadDoc(){
  const d=docs.find(d=>d.id===viewingDocId);if(!d)return;
  const a=document.createElement('a');a.href=d.blobUrl;a.download=d.name;a.click();
}

// ── CALENDAR ──
function getAllEvents(){
  const evs=[];
  tasks.filter(t=>!t.done&&t.date).forEach(t=>evs.push({date:t.date,title:t.title,cat:t.cat,type:'task',tid:t.id}));
  docs.filter(d=>d.calEvents?.length).forEach(d=>d.calEvents.forEach(e=>evs.push({...e,type:'doc'})));
  calManual.forEach(e=>evs.push({...e,type:'manual'}));
  return evs;
}
function renderCal(){
  const evs=getAllEvents();
  const vt=`<div class="vtabs">
    <button class="vtab${calview==='month'?' on':''}" onclick="calview='month';render()">Month</button>
    <button class="vtab${calview==='week'?' on':''}" onclick="calview='week';render()">Week</button>
    <button class="vtab${calview==='day'?' on':''}" onclick="calview='day';render()">Day</button>
  </div>`;
  if(calview==='month') document.getElementById('content').innerHTML=renderMonth(evs,vt);
  else if(calview==='week') document.getElementById('content').innerHTML=renderWeek(evs,vt);
  else document.getElementById('content').innerHTML=renderDay(evs,vt);
}
function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function renderMonth(evs,vt){
  const y=caldate.getFullYear(),m=caldate.getMonth();
  const mn=caldate.toLocaleDateString('en-AU',{month:'long',year:'numeric'});
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  const today=new Date();today.setHours(0,0,0,0);
  let h=`<div class="cal-ctrl">
    <div class="cal-nav">
      <button class="cal-navbtn" onclick="caldate=new Date(${y},${m-1},1);render()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title">${mn}</div>
      <button class="cal-navbtn" onclick="caldate=new Date(${y},${m+1},1);render()"><i class="ti ti-chevron-right"></i></button>
    </div>${vt}</div>
  <div class="cal-month-dows">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cdow">${d}</div>`).join('')}</div>
  <div class="cal-month-grid">`;
  const total=Math.ceil((startDow+last.getDate())/7)*7;
  for(let i=0;i<total;i++){
    const dn=i-startDow+1,inM=dn>=1&&dn<=last.getDate();
    const cd=new Date(y,m,dn);cd.setHours(0,0,0,0);
    const isT=cd.getTime()===today.getTime();
    const dstr=ds(cd);
    const de=evs.filter(e=>e.date===dstr);
    h+=`<div class="ccell${!inM?' omonth':''}${isT?' today':''}">
      <div class="cdaynum">${inM?dn:''}</div>
      ${de.slice(0,3).map(e=>`<div class="cev ${e.cat||e.type}" title="${esc(e.title)}" onclick="openModal('editCalEvent','${e.type==='manual'?e.id:''}')">${esc(e.title)}</div>`).join('')}
      ${de.length>3?`<div style="font-size:10px;color:var(--w30);padding:1px 4px">+${de.length-3} more</div>`:''}
    </div>`;
  }
  return h+'</div>';
}
function renderWeek(evs,vt){
  const dow=(caldate.getDay()+6)%7;
  const ws=new Date(caldate);ws.setDate(caldate.getDate()-dow);ws.setHours(0,0,0,0);
  const days=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
  const today=new Date();today.setHours(0,0,0,0);
  const wl=`${days[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}`;
  let h=`<div class="cal-ctrl">
    <div class="cal-nav">
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()-7*86400000);render()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title" style="font-size:16px">${wl}</div>
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()+7*86400000);render()"><i class="ti ti-chevron-right"></i></button>
    </div>${vt}</div>
  <div class="cal-week-hdrs" style="grid-template-columns:repeat(7,1fr)">`;
  days.forEach(d=>{const isT=d.getTime()===today.getTime();h+=`<div class="cwkhdr${isT?' today':''}"><div class="cwkday">${d.toLocaleDateString('en-AU',{weekday:'short'})}</div><div class="cwkdate">${d.getDate()}</div></div>`;});
  h+=`</div><div class="cal-week-grid" style="grid-template-columns:repeat(7,1fr)">`;
  days.forEach(d=>{const dstr=ds(d),de=evs.filter(e=>e.date===dstr);h+=`<div class="cwkcol">${de.map(e=>`<div class="cev ${e.cat||e.type}" style="margin-bottom:4px">${esc(e.title)}</div>`).join('')}${!de.length?`<div style="font-size:10px;color:var(--w30)">—</div>`:''}</div>`;});
  return h+'</div>';
}
function renderDay(evs,vt){
  const today=new Date();today.setHours(0,0,0,0);
  const d2=new Date(caldate);d2.setHours(0,0,0,0);
  const dstr=ds(d2),de=evs.filter(e=>e.date===dstr);
  const lbl=d2.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  return `<div class="cal-ctrl">
    <div class="cal-nav">
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()-86400000);render()"><i class="ti ti-chevron-left"></i></button>
      <div class="cal-title" style="font-size:16px">${lbl}</div>
      <button class="cal-navbtn" onclick="caldate=new Date(caldate.getTime()+86400000);render()"><i class="ti ti-chevron-right"></i></button>
    </div>${vt}</div>
  <div class="cal-day-view"><h3>${d2.getTime()===today.getTime()?'Today':'Events'}</h3>
    ${!de.length?'<div style="font-size:13px;color:var(--w55);padding:10px 0">Nothing scheduled</div>':''}
    ${de.map(e=>`<div class="dayev" onclick="${e.type==='manual'?`openModal('editCalEvent','${e.id}')`:''}">
      <div class="dayev-dot" style="background:${CAT_COLORS[e.cat||e.type]||'#aaa'}"></div>
      <div class="dayev-info"><div class="dayev-title">${esc(e.title)}</div><div class="dayev-type">${CATS[e.cat]||e.type==='doc'?'From document '+(e.source||''):'Manual entry'}${e.notes?` · ${esc(e.notes)}`:''}</div></div>
      ${e.type==='manual'?`<div class="dayev-acts"><button class="ibtn" onclick="openModal('editCalEvent','${e.id}');event.stopPropagation()"><i class="ti ti-edit"></i></button><button class="ibtn del" onclick="delCalEvent('${e.id}');event.stopPropagation()"><i class="ti ti-trash"></i></button></div>`:''}
    </div>`).join('')}
  </div>`;
}

// ── INTERACTIONS ──
function setTF(f){tf=f;render();}
function setTermF(f){termf=f;render();}
function toggleT(id){expT[id]=!expT[id];render();}
function toggleP(id){expP[id]=!expP[id];render();}
function checkTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;if(t.done)delete expT[id];}render();}
function checkSub(tid,sid){const t=tasks.find(t=>t.id===tid);const s=t?.subtasks.find(s=>s.id===sid);if(s)s.done=!s.done;render();}
function checkStep(pid,sid){const p=projects.find(p=>p.id===pid);const s=p?.steps.find(s=>s.id===sid);if(s)s.done=!s.done;render();}
function addSub(tid){const el=document.getElementById('ns-'+tid);if(!el?.value.trim())return;const t=tasks.find(t=>t.id===tid);if(t){t.subtasks.push({id:id++,title:el.value.trim(),done:false});expT[tid]=true;}render();}
function addStep(pid){const el=document.getElementById('np-'+pid);if(!el?.value.trim())return;const p=projects.find(p=>p.id===pid);if(p){p.steps.push({id:id++,title:el.value.trim(),note:'',done:false});expP[pid]=true;}render();}
function delTask(tid){if(confirm('Delete this task?')){tasks=tasks.filter(t=>t.id!==tid);render();}}
function delSub(tid,sid){const t=tasks.find(t=>t.id===tid);if(t)t.subtasks=t.subtasks.filter(s=>s.id!==sid);render();}
function delStep(pid,sid){const p=projects.find(p=>p.id===pid);if(p)p.steps=p.steps.filter(s=>s.id!==sid);render();}
function delProject(pid){if(confirm('Delete this project?')){projects=projects.filter(p=>p.id!==pid);render();}}
function clearArchive(){if(confirm('Permanently delete all completed tasks?')){tasks=tasks.filter(t=>!t.done);render();}}
function delCalEvent(eid){calManual=calManual.filter(e=>e.id!==eid);render();}

// ── DOCUMENTS ──
function handleDrop(e){e.preventDefault();document.getElementById('dropzone')?.classList.remove('drag');handleFiles(e.dataTransfer.files);}
document.getElementById('file-input').addEventListener('change',e=>{handleFiles(e.target.files);e.target.value='';});
function handleFiles(files){
  Array.from(files).forEach(f=>{
    const sl=f.size>1048576?`${(f.size/1048576).toFixed(1)} MB`:`${Math.round(f.size/1024)} KB`;
    const blobUrl=URL.createObjectURL(f);
    docs.push({id:id++,name:f.name,type:f.type||'',sizeLabel:sl,dateAdded:new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'}),folder:docFolder,processed:false,processing:false,eventsFound:0,file:f,blobUrl,calEvents:[]});
  });
  if(view==='docs')render();
}
async function processDoc(docId){
  const d=docs.find(d=>d.id===docId);if(!d)return;
  d.processing=true;render();
  try{
    let mc;
    if(d.type.startsWith('image/')){const b64=await f2b64(d.file);mc=[{type:'image',source:{type:'base64',media_type:d.type,data:b64}},{type:'text',text:'Extract all dates, deadlines, tasks and events. Return JSON only: {"events":[{"date":"YYYY-MM-DD","title":"name"}]}. Only items with a clear date.'}];}
    else{const txt=await d.file.text().catch(()=>'');mc=[{type:'text',text:`Extract all dates, deadlines, tasks and events. Return JSON only: {"events":[{"date":"YYYY-MM-DD","title":"name"}]}. Only items with clear dates.\n\n${txt.slice(0,8000)}`}];}
    const resp=await callClaude(mc);
    try{const p=JSON.parse(resp.replace(/```json|```/g,'').trim());d.calEvents=(p.events||[]).filter(e=>e.date&&e.title).map(e=>({...e,cat:'doc',source:d.name}));d.eventsFound=d.calEvents.length;}catch{d.eventsFound=0;}
  }catch(e){console.error(e);}
  d.processing=false;d.processed=true;render();
}
function delDoc(docId){if(confirm('Remove this file?')){const d=docs.find(d=>d.id===docId);if(d?.blobUrl)URL.revokeObjectURL(d.blobUrl);docs=docs.filter(d=>d.id!==docId);render();}}
function delFolder(fid){if(confirm('Delete this folder and all its files?')){docs.filter(d=>d.folder===fid).forEach(d=>{if(d.blobUrl)URL.revokeObjectURL(d.blobUrl);});docs=docs.filter(d=>d.folder!==fid);folders=folders.filter(f=>f.id!==fid);render();}}
async function f2b64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});}
async function callClaude(mc){const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:mc}]})});const d=await r.json();return d.content?.map(i=>i.text||'').join('')||'';}

// ── MODAL ──
function openModal(mode,...args){
  mmode=mode;margs=args;
  document.getElementById('overlay').classList.add('open');
  const title=document.getElementById('mtitle'),body=document.getElementById('mbody');
  if(mode==='addTask'||mode==='editTask'){
    const t=mode==='editTask'?tasks.find(t=>t.id===args[0]):{};
    title.textContent=mode==='addTask'?'Add task':'Edit task';
    body.innerHTML=taskForm(t||{});
  } else if(mode==='addProject'||mode==='editProject'){
    const p=mode==='editProject'?projects.find(p=>p.id===args[0]):{};
    title.textContent=mode==='addProject'?'Add project':'Edit project';
    body.innerHTML=projForm(p||{});
  } else if(mode==='editSub'){
    const t=tasks.find(t=>t.id===args[0]),s=t?.subtasks.find(s=>s.id===args[1]);
    title.textContent='Edit step';body.innerHTML=`<div class="fg"><label>Step title</label><input type="text" id="f-sub" value="${esc(s?.title||'')}"></div>`;
  } else if(mode==='editStep'){
    const p=projects.find(p=>p.id===args[0]),s=p?.steps.find(s=>s.id===args[1]);
    title.textContent='Edit step';body.innerHTML=`<div class="fg"><label>Step title</label><input type="text" id="f-stit" value="${esc(s?.title||'')}"></div><div class="fg"><label>Note</label><input type="text" id="f-snote" value="${esc(s?.note||'')}"></div>`;
  } else if(mode==='addFolder'){
    title.textContent='New folder';body.innerHTML=`<div class="fg"><label>Folder name</label><input type="text" id="f-fname" placeholder="e.g. NESA Documents"></div>`;
  } else if(mode==='addCalEvent'||mode==='editCalEvent'){
    const ev=mode==='editCalEvent'?calManual.find(e=>e.id===args[0]):null;
    title.textContent=mode==='addCalEvent'?'Add calendar event':'Edit calendar event';
    const catOpts=Object.keys(CATS).map(c=>`<option value="${c}"${ev?.cat===c?' selected':''}>${CATS[c]}</option>`).join('');
    body.innerHTML=`<div class="fg"><label>Event title</label><input type="text" id="f-etit" value="${esc(ev?.title||'')}" placeholder="e.g. Principal meeting"></div>
      <div class="fg"><label>Date</label><input type="date" id="f-edate" value="${ev?.date||''}"></div>
      <div class="fg"><label>Category</label><select id="f-ecat"><option value="manual">General</option>${catOpts}</select></div>
      <div class="fg"><label>Notes (optional)</label><textarea id="f-enotes">${ev?.notes||''}</textarea></div>`;
  }
  setTimeout(()=>document.querySelector('.modal input, .modal select')?.focus(),80);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');mmode=null;margs=[];}
function saveModal(){
  if(mmode==='addTask'||mmode==='editTask'){
    const title=document.getElementById('f-title')?.value.trim();if(!title)return;
    const d={title,cat:document.getElementById('f-cat').value,term:document.getElementById('f-term').value,date:document.getElementById('f-date').value,notes:document.getElementById('f-notes').value.trim()};
    if(mmode==='addTask') tasks.push({id:id++,done:false,subtasks:[],...d});
    else{const t=tasks.find(t=>t.id===margs[0]);if(t)Object.assign(t,d);}
  } else if(mmode==='addProject'||mmode==='editProject'){
    const name=document.getElementById('f-pname')?.value.trim();if(!name)return;
    const d={name,icon:document.getElementById('f-picon').value};
    if(mmode==='addProject') projects.push({id:id++,steps:[],...d});
    else{const p=projects.find(p=>p.id===margs[0]);if(p)Object.assign(p,d);}
  } else if(mmode==='editSub'){
    const t=tasks.find(t=>t.id===margs[0]),s=t?.subtasks.find(s=>s.id===margs[1]);
    const v=document.getElementById('f-sub')?.value.trim();if(s&&v)s.title=v;
  } else if(mmode==='editStep'){
    const p=projects.find(p=>p.id===margs[0]),s=p?.steps.find(s=>s.id===margs[1]);
    if(s){s.title=document.getElementById('f-stit')?.value.trim()||s.title;s.note=document.getElementById('f-snote')?.value.trim()||'';}
  } else if(mmode==='addFolder'){
    const name=document.getElementById('f-fname')?.value.trim();if(!name)return;
    folders.push({id:'f'+(id++),name,parent:docFolder});
  } else if(mmode==='addCalEvent'||mmode==='editCalEvent'){
    const title=document.getElementById('f-etit')?.value.trim();if(!title)return;
    const d={title,date:document.getElementById('f-edate').value,cat:document.getElementById('f-ecat').value,notes:document.getElementById('f-enotes')?.value.trim()||''};
    if(mmode==='addCalEvent') calManual.push({id:'ce'+(id++),...d});
    else{const e=calManual.find(e=>e.id===margs[0]);if(e)Object.assign(e,d);}
  }
  closeModal();render();
}
function taskForm(t){
  const co=Object.keys(CATS).map(c=>`<option value="${c}"${t.cat===c?' selected':''}>${CATS[c]}</option>`).join('');
  const to=Object.keys(TERMS).map(k=>`<option value="${k}"${t.term===k?' selected':''}>${TERMS[k].l}</option>`).join('');
  return `<div class="fg"><label>Task title</label><input type="text" id="f-title" value="${esc(t.title||'')}" placeholder="e.g. Submit SCOUT data"></div>
    <div class="fg"><label>Category</label><select id="f-cat">${co}</select></div>
    <div class="fg"><label>Term</label><select id="f-term">${to}</select></div>
    <div class="fg"><label>Due date</label><input type="date" id="f-date" value="${t.date||''}"></div>
    <div class="fg"><label>Notes (optional)</label><textarea id="f-notes">${t.notes||''}</textarea></div>`;
}
function projForm(p){
  const io=ICONS.map(i=>`<option value="${i}"${p.icon===i?' selected':''}>${i.replace('ti-','')}</option>`).join('');
  return `<div class="fg"><label>Project name</label><input type="text" id="f-pname" value="${esc(p.name||'')}" placeholder="e.g. Curriculum Review 2026"></div>
    <div class="fg"><label>Icon</label><select id="f-picon">${io}</select></div>`;
}
function exportCSV(){
  const rows=[['Title','Category','Term','Due Date','Status','Notes','Subtasks']];
  tasks.forEach(t=>{const subs=(t.subtasks||[]).map(s=>`${s.title}(${s.done?'done':'pending'})`).join(' | ');rows.push([`"${t.title}"`,CATS[t.cat]||t.cat,t.term,t.date,t.done?'Done':'Active',`"${t.notes}"`,`"${subs}"`]);});
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download=`trinity-${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('dv-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDocViewer();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeDocViewer();}});
renderTopbar();render();
</script>
